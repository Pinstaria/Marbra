<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Race: Ultimate Spectator Edition</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0b0d14; --panel: linear-gradient(145deg, #1a1e29, #12151c); }
        body { margin: 0; background: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        h1 { margin: 20px 0 10px 0; font-size: 32px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(0,255,204,0.4); text-align: center;}
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #fff; }

        .panel { background: var(--panel); padding: 25px 35px; border-radius: 16px; border: 1px solid #2a3040; box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-top: 10px; margin-bottom: 25px; max-width: 900px; width: 95%; display: none; }
        #setupMenu { display: block; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group { text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;}
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #0f111a; color: #fff; font-size: 14px; box-sizing: border-box; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(0,255,204,0.2); }
        .form-group textarea { resize: vertical; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--primary); background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border: 1px solid #334155;}
        .checkbox-group input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary);}

        .marble-header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 12px; border-top: 1px solid #334155; padding-top: 20px;}
        .marble-list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding-right: 8px; margin-bottom: 15px;}
        .marble-row { display: grid; grid-template-columns: 35px 50px 1fr 120px 45px; gap: 10px; align-items: center; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; transition: 0.2s;}
        .marble-row:hover { border-color: #475569; background: rgba(0,0,0,0.5); }
        .marble-row input[type="color"] { width: 100%; height: 35px; border: none; cursor: pointer; background: transparent; padding: 0;}
        
        .btn { background: var(--primary); color: #0b0d14; border: none; padding: 12px 24px; font-size: 14px; font-weight: 800; cursor: pointer; border-radius: 8px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; justify-content: center;}
        .btn:hover { background: #fff; box-shadow: 0 0 20px rgba(0,255,204,0.6); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-small { padding: 8px 12px; font-size: 12px; }
        .btn-danger { background: #f43f5e; color: #fff; }
        .btn-danger:hover { background: #ff4d6d; box-shadow: 0 0 20px rgba(244,63,94,0.6); }
        .btn-primary { background: #fbbf24; font-size: 18px; padding: 16px; margin-top: 10px;}
        .btn-primary:hover { background: #fff; box-shadow: 0 0 20px rgba(251,191,36,0.6); }

        #gameUI { background: transparent; border: none; box-shadow: none; max-width: 1300px; padding: 0; }
        #gameWrapper { display: flex; gap: 20px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .canvas-container { position: relative; }
        canvas { background-size: cover; background-position: center; border: 4px solid #1e293b; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        #roundBanner { position: absolute; top: 15px; left: 15px; background: rgba(15,23,42,0.9); color: #fbbf24; padding: 10px 20px; border-radius: 8px; font-weight: 800; border: 1px solid #fbbf24; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5); text-transform: uppercase;}

        #liveLeaderboard { width: 320px; background: rgba(18, 21, 28, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; flex-direction: column; max-height: 700px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .lb-title { text-align: center; font-weight: 800; color: var(--primary); padding: 15px; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; letter-spacing: 1px; background: rgba(0,0,0,0.2); border-radius: 12px 12px 0 0;}
        #lbContentWrapper { overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; padding: 10px; flex: 1; }
        .lb-item { display: flex; align-items: center; padding: 8px 10px; margin-bottom: 6px; background: rgba(0,0,0,0.4); border-radius: 6px; font-size: 14px; font-weight: 700; border: 1px solid transparent; transition: 0.2s; cursor: pointer;}
        .lb-item:hover { border-color: var(--primary); background: rgba(0,255,204,0.1); }
        .lb-item.eliminated { opacity: 0.5; filter: grayscale(1); }
        .lb-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 12px; border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.5); flex-shrink: 0;}
        .lb-rank { width: 30px; color: #94a3b8; font-size: 13px;}
        .lb-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-time { font-family: monospace; font-size: 12px; color: #fbbf24; }

        #graphCanvas { background: #0f111a; width: 100%; height: 350px; border-radius: 12px; margin-top: 15px; border: 1px solid #334155;}
        .graph-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; justify-content: center; font-size: 13px; font-weight: 600;}
        .legend-item { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 12px; border: 1px solid #334155;}
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }
        .tournament-results { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid #334155;}
    </style>
</head>
<body>
    <h1>Marble Race Pro</h1>

    <div id="setupMenu" class="panel">
        <div class="settings-grid">
            <div class="form-group"><label>Race Mode</label>
                <select id="raceModeSelect" onchange="toggleModes()">
                    <option value="classic">Classic Finish Line</option>
                    <option value="knockout">Checkpoints (Knockout Elimination)</option>
                </select>
            </div>
            <div class="form-group"><label>Virtual Map Length/Size (Pixels)</label><input type="number" id="trackLength" value="5000" min="1000" max="100000"></div>
            <div class="form-group"><label>Map Architecture (30 Layouts)</label><select id="mapArchitectureSelect"></select></div>
            <div class="form-group"><label>Visual Theme Backgrounds</label><select id="trackDesignSelect" onchange="updateCustomBgState()"></select></div>
        </div>

        <div id="knockoutSettings" style="display:none; margin-bottom: 15px; background: #0f111a; padding: 15px; border-radius: 8px; border: 1px solid #ff3366;">
            <label style="color: #ff3366; font-weight:bold; font-size:13px; text-transform:uppercase;">Knockout Checkpoint Settings</label>
            <div style="display:flex; gap:10px; align-items:center; margin-top:10px; font-size:14px;">
                Place a Checkpoint every <input type="number" id="cpInterval" value="2000" style="width:80px;"> px. 
                Eliminate the last <input type="number" id="cpElim" value="2" style="width:60px;"> to cross it.
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label class="checkbox-group"><input type="checkbox" id="tournamentToggle" onchange="toggleModes()"> Enable Multi-Round Tournament</label>
            <div id="tournamentSettings" style="display:none; margin-top: 10px; background: #0f111a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                <label style="color: #fbbf24;">Tournament Elimination Pattern (e.g., "2, 1, 3")</label><input type="text" id="eliminationPattern" value="2, 1, 1" placeholder="Comma separated numbers">
            </div>
        </div>

        <div class="settings-grid" style="margin-bottom: 0;">
            <div class="form-group">
                <label>Bulk Add List (1 Name per line)</label><textarea id="bulkAddList" rows="3" placeholder="Red Team&#10;Blue Team"></textarea>
                <button class="btn btn-small" onclick="addBulkMarbles()" style="margin-top: 8px; width: 100%;">+ Bulk Add List</button>
            </div>
            <div class="form-group"><label>Roster Templates</label><select id="templateSelect" size="4" style="height: 85px;" onchange="applyTemplate()"></select></div>
        </div>

        <div class="marble-header">
            <div style="font-size: 16px; font-weight:800; color: #00ffcc;">COMPETITORS (<span id="marbleCountDisplay">16</span>)</div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-small btn-add" style="background:#38bdf8;" onclick="addMarble()">+ Add 1</button>
                <button class="btn btn-small" onclick="randomizeAllColors()" style="background:#fbbf24;">🎲 Colors</button>
                <button class="btn btn-small btn-danger" onclick="clearMarbles()">🗑️ Clear</button>
            </div>
        </div>
        
        <div class="marble-list" id="marbleList"></div>
        <button class="btn btn-primary" onclick="startTournament()" style="width: 100%; margin-top: 15px;">🚀 GENERATE MAP & START RACE! 🚀</button>
    </div>

    <div id="gameUI" class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:1000px; margin: 0 auto 15px auto; background:rgba(0,0,0,0.5); padding:10px 20px; border-radius:8px; border:1px solid #334155; box-sizing:border-box;">
            <div><button class="btn btn-small" style="background:#8b5cf6; color:#fff;" onclick="spectateNearest()">👁️ Spectate Leader</button></div>
            <div style="font-family:monospace; font-size:24px; font-weight:bold; color:var(--primary); text-shadow:0 0 10px rgba(0,255,204,0.5);" id="gameTimer">00:00.000000</div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-small btn-danger" id="recordBtn" onclick="toggleRecording()">🔴 Record</button>
                <button class="btn btn-small btn-danger" onclick="abortRace()">Abort Race</button>
            </div>
        </div>
        <div id="gameWrapper">
            <div class="canvas-container">
                <div id="roundBanner" style="display:none;">Round 1</div>
                <canvas id="raceCanvas" width="500" height="700"></canvas>
            </div>
            <div id="liveLeaderboard">
                <div class="lb-title">LIVE STANDINGS</div>
                <div id="lbContentWrapper"><div id="lbContent"></div></div>
            </div>
        </div>
    </div>

    <div id="postRaceUI" class="panel">
        <h2 style="color: #00ffcc; text-align: center; margin-top: 0; font-size: 28px;" id="postRaceTitle">Race Complete!</h2>
        <h3 id="winnerText" style="text-align: center; margin-bottom: 10px; color: #fff;"></h3>
        
        <div style="background: #0f111a; padding: 15px; border-radius: 8px; border: 1px solid #38bdf8; margin-top: 15px; text-align:center;">
            <h4 style="color: #38bdf8; margin: 0 0 10px 0; text-transform: uppercase;">Closest Finishes (Top 3)</h4>
            <div id="closestFinishes" style="font-family:monospace; font-size:16px; font-weight:bold; line-height:1.6;"></div>
        </div>

        <div id="tournamentResults" class="tournament-results" style="display: none;">
            <div style="background: #0f111a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                <h4 style="color: #00ffcc; margin: 0 0 10px 0; border-bottom: 1px solid #334155; padding-bottom: 8px; text-transform: uppercase;">Advance to Next Round</h4><div id="advancingList" style="line-height: 1.6;"></div>
            </div>
            <div style="background: #0f111a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                <h4 style="color: #f43f5e; margin: 0 0 10px 0; border-bottom: 1px solid #334155; padding-bottom: 8px; text-transform: uppercase;">Eliminated</h4><div id="eliminatedList" style="line-height: 1.6; color: #94a3b8; text-decoration: line-through;"></div>
            </div>
        </div>

        <label style="color:#94a3b8; font-weight:700; display:block; margin-top:25px; text-transform: uppercase;">Placement History Tracker</label>
        <canvas id="graphCanvas" width="800" height="350"></canvas>
        <div class="graph-legend" id="graphLegend"></div>
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
            <button class="btn btn-danger" onclick="fullReset()">Exit to Main Menu</button>
            <button class="btn btn-primary" style="margin-top:0;" id="nextRoundBtn" style="display:none;" onclick="startNextRound()">Start Next Round!</button>
        </div>
    </div>
    <script>
const GRAVITY = 0.18; const RESTITUTION = 0.55; 
const canvas = document.getElementById('raceCanvas'); const ctx = canvas.getContext('2d');

const trackDesigns = [
    { name: "1. Classic Dark", bg: "#0a0a0a", lines: "#00ffcc", pegs: "#555555" }, { name: "2. Matrix", bg: "#001100", lines: "#00ff00", pegs: "#004400" },
    { name: "3. Synthwave", bg: "linear-gradient(to bottom, #2b00ff, #ff007c)", lines: "#00ffff", pegs: "#ffffff" }, { name: "4. Deep Ocean", bg: "#000b18", lines: "#ffffff", pegs: "#0077ff" },
    { name: "5. Lava Pool", bg: "#220000", lines: "#ff4400", pegs: "#ffcc00" }, { name: "6. Blizzard", bg: "#eef2f5", lines: "#88ccff", pegs: "#999999" },
    { name: "7. Desert Sands", bg: "#d2b48c", lines: "#8b4513", pegs: "#228b22" }, { name: "8. Emerald Forest", bg: "#002200", lines: "#00ff44", pegs: "#8b4513" },
    { name: "9. Deep Space", bg: "radial-gradient(circle, #1a0033, #000000)", lines: "#ffffff", pegs: "#aa00ff" }, { name: "10. Sunset Drive", bg: "linear-gradient(to bottom, #ff5500, #aa00ff)", lines: "#ffee00", pegs: "#330033" },
    { name: "11. Cyberpunk City", bg: "#fcee0a", lines: "#000000", pegs: "#ff0055" }, { name: "12. Retro Arcade", bg: "#000033", lines: "#ff00ff", pegs: "#00ffff" },
    { name: "13. Royal Velvet", bg: "#4a0010", lines: "#ffd700", pegs: "#ffd700" }, { name: "14. Monochrome", bg: "#ffffff", lines: "#000000", pegs: "#000000" },
    { name: "15. Cotton Candy", bg: "#ffccdd", lines: "#ff00aa", pegs: "#ffffff" }, { name: "16. Toxic Spill", bg: "#1a1a1a", lines: "#aaff00", pegs: "#ccff00" },
    { name: "17. Obsidian Volcano", bg: "#111111", lines: "#ff0000", pegs: "#333333" }, { name: "18. Midnight Moon", bg: "#00001a", lines: "#c0c0c0", pegs: "#add8e6" },
    { name: "19. Autumn Leaves", bg: "#3b0918", lines: "#ff8c00", pegs: "#a52a2a" }, { name: "20. Blueprint", bg: "#003366", lines: "#ffffff", pegs: "#ffffff" }
];

const templates = {
    "Default Colors (16)": ["Ruby:#ff0055", "Cyan:#00ffcc", "Gold:#ffcc00", "Amethyst:#9900ff", "Emerald:#00ff00", "Cobalt:#0066ff", "Pearl:#ffffff", "Obsidian:#333333", "Crimson:#dc143c", "Lime:#32cd32", "Indigo:#4b0082", "Coral:#ff7f50", "Teal:#008080", "Lavender:#e6e6fa", "Magenta:#ff00ff", "Silver:#c0c0c0"],
    "Countries A (16)": ["USA:#0033a0", "Japan:#bc002d", "Brazil:#009c3b", "Germany:#ffce00", "France:#0055a4", "India:#ff9933", "Canada:#ff0000", "UK:#012169", "Italy:#009246", "Mexico:#006847", "Australia:#00008b", "Spain:#aa151b", "S. Korea:#ffffff", "Argentina:#74acdf", "Egypt:#ce1126", "Sweden:#ffc90e"],
    "Countries B (16)": ["China:#ee1c25", "Russia:#0039a6", "S. Africa:#007749", "Nigeria:#008751", "Netherlands:#ae1c28", "Turkey:#e30a17", "Saudi Arabia:#006c35", "Switzerland:#d52b1e", "Colombia:#fcd116", "Poland:#dc143c", "Ukraine:#005bbc", "Greece:#0d5eaf", "Vietnam:#da251d", "Chile:#0039a6", "Peru:#d91023", "Thailand:#a51931"],
    "Solar System+ (16)": ["Sun:#ffcc00", "Mercury:#888888", "Venus:#e3bb76", "Earth:#2b82c9", "Moon:#d3d3d3", "Mars:#c1440e", "Phobos:#a0a0a0", "Jupiter:#d39c7e", "Europa:#e8e4c9", "Saturn:#f3d17d", "Titan:#d8a56d", "Uranus:#4b70dd", "Neptune:#274687", "Triton:#bcc6cc", "Pluto:#dddddd", "Charon:#999999"],
    "Elements (16)": ["Fire:#ff3300", "Water:#0066ff", "Earth:#44aa00", "Wind:#ccffff", "Lightning:#ffee00", "Ice:#00ffff", "Metal:#aaaaaa", "Shadow:#222222", "Light:#ffffee", "Wood:#8b5a2b", "Plasma:#ff00ff", "Poison:#8a2be2", "Gravity:#4b0082", "Time:#ffd700", "Space:#000080", "Aether:#ffb6c1"],
    "Tech Giants (16)": ["Apple:#a3aaae", "Google:#4285f4", "Microsoft:#f25022", "Amazon:#ff9900", "Meta:#0668e1", "Tesla:#cc0000", "Nvidia:#76b900", "Netflix:#e50914", "AMD:#ed1c24", "Intel:#0071c5", "IBM:#0530ad", "Sony:#000000", "Samsung:#1428a0", "Oracle:#f80000", "Cisco:#1ba0d7", "Adobe:#ff0000"],
    "Fruits (16)": ["Apple:#ff0800", "Banana:#ffe135", "Orange:#ffa500", "Grape:#6f2da8", "Strawberry:#fc5a8d", "Melon:#fdc58e", "Pineapple:#ffcc00", "Mango:#ffdd55", "Peach:#ffcba4", "Cherry:#de3163", "Lemon:#fff700", "Kiwi:#8ee53f", "Pear:#d1e231", "Plum:#dda0dd", "Blueberry:#4f86f7", "Coconut:#ffffff"],
    "Crypto (16)": ["Bitcoin:#f7931a", "Ethereum:#627eea", "Tether:#26a17b", "BNB:#f3ba2f", "Solana:#14f195", "XRP:#23292f", "USDC:#2775ca", "Cardano:#0033ad", "Avalanche:#e84142", "Dogecoin:#c2a633", "Polkadot:#e6007a", "Tron:#ff0013", "Polygon:#8247e5", "Chainlink:#2a5ada", "Litecoin:#345d9d", "Shiba:#e03328"]
};

function spawnGrid(comps, mode) {
    let cols = Math.min(12, comps.length);
    comps.forEach((data, i) => {
        let r = Math.floor(i / cols); let c = i % cols; let total = Math.min(cols, comps.length - r*cols); let x, y;
        if (mode === 'top') { x = (boundX/2) - ((total-1)*30/2) + c*30; y = 40 - r*25; }
        else if (mode === 'bottom') { x = (boundX/2) - ((total-1)*30/2) + c*30; y = boundY - 40 + r*25; }
        else if (mode === 'left') { y = (boundY/2) - ((total-1)*30/2) + c*30; x = 40 - r*25; }
        else if (mode === 'right') { y = (boundY/2) - ((total-1)*30/2) + c*30; x = boundX - 40 + r*25; }
        else if (mode === 'ring') { let angle = (i/comps.length) * Math.PI*2; let rad = (boundX/2)-50; x = boundX/2 + Math.cos(angle)*rad; y = boundY/2 + Math.sin(angle)*rad; }
        marbles.push(new Marble(x, y, data));
    });
}
function randPegs(c, xs, xe, ys, ye, b=RESTITUTION) { let n = Math.floor((((xe-xs)*(ye-ys))/4000)*c); for(let i=0; i<n; i++) pegs.push(new Peg(xs+Math.random()*(xe-xs), ys+Math.random()*(ye-ys), Math.random()*3+3, b)); }

const mapArchitectures = [
    { name: "1. Classic Vertical Drop", init: (len) => { boundX = 500; boundY = len; randPegs(1, 20, 480, 150, boundY-150); }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: 0, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }) },
    { name: "2. Horizontal Dash", init: (len) => { boundX = len; boundY = 700; randPegs(1, 150, boundX-150, 20, 680); }, spawn: (c) => spawnGrid(c, 'left'), getGravity: () => ({x: GRAVITY, y: 0}), checkFinish: (m) => m.x > boundX - 50, getProgress: (m) => m.x, camTarget: (l) => ({ x: l.x - 250, y: 0 }) },
    { name: "3. Reverse Dash", init: (len) => { boundX = len; boundY = 700; randPegs(1, 150, boundX-150, 20, 680); }, spawn: (c) => spawnGrid(c, 'right'), getGravity: () => ({x: -GRAVITY, y: 0}), checkFinish: (m) => m.x < 50, getProgress: (m) => -m.x, camTarget: (l) => ({ x: l.x - 250, y: 0 }) },
    { name: "4. Anti-Gravity Ascension", init: (len) => { boundX = 500; boundY = len; randPegs(1, 20, 480, 150, boundY-150); }, spawn: (c) => spawnGrid(c, 'bottom'), getGravity: () => ({x: 0, y: -GRAVITY}), checkFinish: (m) => m.y < 50, getProgress: (m) => -m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }) },
    { name: "5. The Black Hole", init: (len) => { boundX = 1500; boundY = 1500; randPegs(0.8, 100, 1400, 100, 1400); }, spawn: (c) => spawnGrid(c, 'ring'), getGravity: (m) => { let dx = 750 - m.x, dy = 750 - m.y; let d = Math.sqrt(dx*dx + dy*dy) || 1; return { x: (dx/d)*GRAVITY*1.5, y: (dy/d)*GRAVITY*1.5 }; }, checkFinish: (m) => Math.sqrt((750-m.x)**2 + (750-m.y)**2) < 40, getProgress: (m) => -Math.sqrt((750-m.x)**2 + (750-m.y)**2), camTarget: (l) => ({ x: l.x - 250, y: l.y - 350 }) },

class Marble {
    constructor(x, y, data) { this.x = x; this.y = y; this.vx = (Math.random()-0.5)*3; this.vy = (Math.random()-0.5)*3; this.radius = 10; this.color = data.color; this.name = data.name; this.img = data.img; this.dataRef = data; this.finished = false; this.eliminated = false; this.finishRank = 0; this.finishTime = 0; this.history = []; this.progressHistory = []; this.passedCheckpoints = []; this.stuckFrames = 0;}
    update() {
        if (this.finished || this.eliminated) return;
        let grav = curArch.getGravity(this); this.vx += grav.x + (Math.random()-0.5)*0.02; this.vy += grav.y + (Math.random()-0.5)*0.02; this.vx *= 0.99; this.vy *= 0.99; this.x += this.vx; this.y += this.vy;
        
        if (curArch.wrapX) { if (this.x < 0) this.x = boundX; else if (this.x > boundX) this.x = 0; } 
        else { if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -RESTITUTION; } else if (this.x + this.radius > boundX) { this.x = boundX - this.radius; this.vx *= -RESTITUTION; } }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -RESTITUTION; } else if (this.y + this.radius > boundY && !isKnockoutMode) { this.y = boundY - this.radius; this.vy *= -RESTITUTION; }
        
        let prog = curArch.getProgress(this); this.progressHistory.push(prog);
        if (Math.abs(this.vx) < 0.1 && Math.abs(this.vy) < 0.1) this.stuckFrames++; else this.stuckFrames = 0;
        
        if (this.progressHistory.length > 90) { 
            let oldProg = this.progressHistory.shift(); 
            if (Math.abs(prog - oldProg) < 5 || this.stuckFrames > 60) { this.vx = (Math.random()-0.5)*25; this.vy = (Math.random()-0.5)*25 - 5; this.progressHistory = []; this.x += (Math.random()-0.5)*15; this.stuckFrames = 0;} 
        }

        if (isKnockoutMode) {
            for (let i=0; i<checkpoints.length; i++) {
                if (this.y > checkpoints[i] && !this.passedCheckpoints.includes(i)) {
                    this.passedCheckpoints.push(i); checkpointCounts[i]++;
                    if (checkpointCounts[i] > checkpointAllowed[i]) {
                        this.eliminated = true; this.finishTime = performance.now() - raceStartTime; this.finishRank = activeCompetitors.length - checkpointCounts[i] + 1;
                        if(marbles.filter(m=>!m.eliminated).length === 1) {
                            let w = marbles.find(m=>!m.eliminated); w.finished = true; w.finishTime = performance.now() - raceStartTime; w.finishRank = 1; setTimeout(endRace, 1500);
                        }
                    }
                }
            }
        } else if (curArch.checkFinish(this)) { 
            this.finished = true; this.finishTime = performance.now() - raceStartTime; this.finishRank = marbles.filter(m => m.finished).length; 
            if (marbles.every(m => m.finished)) setTimeout(endRace, 1000); 
        }
    }
    draw() {
        if(this.eliminated) ctx.globalAlpha = 0.3;
        ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        if (this.img && this.img.complete) { ctx.clip(); ctx.drawImage(this.img, this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2); } else { ctx.fillStyle = this.color; ctx.fill(); ctx.beginPath(); ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill(); }
        ctx.restore(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.strokeStyle = '#000'; ctx.stroke(); ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.fillText(this.name, this.x, this.y - this.radius - 4);
        if(this.eliminated) { ctx.fillStyle = '#ff3366'; ctx.font = 'bold 16px Arial'; ctx.fillText('❌', this.x, this.y+5); ctx.globalAlpha = 1.0; }
    }
}
class Peg { constructor(x, y, radius, bounce=RESTITUTION) { this.x = x; this.y = y; this.radius = radius; this.bounce = bounce; } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = curTheme.pegs; ctx.fill(); } }
function resolveCollision(marble, peg) { let dx = marble.x - peg.x; let dy = marble.y - peg.y; let dist = Math.sqrt(dx*dx + dy*dy); let minDist = marble.radius + peg.radius; if (dist < minDist) { let overlap = minDist - dist; marble.x += (dx/dist)*overlap; marble.y += (dy/dist)*overlap; let p = 2 * (marble.vx*(dx/dist) + marble.vy*(dy/dist)); marble.vx = ((marble.vx - p*(dx/dist)) * peg.bounce) + (Math.random()-0.5)*0.1; marble.vy = ((marble.vy - p*(dy/dist)) * peg.bounce) + (Math.random()-0.5)*0.1; } }

function startRaceEngine() {
    let len = parseInt(document.getElementById('trackLength').value) || 5000; curTheme = trackDesigns[document.getElementById('trackDesignSelect').value]; curArch = mapArchitectures[document.getElementById('mapArchitectureSelect').value];
    canvas.style.background = customBackgroundImage ? customBackgroundImage : curTheme.bg; document.getElementById('setupMenu').style.display = 'none'; document.getElementById('postRaceUI').style.display = 'none'; document.getElementById('gameUI').style.display = 'block';
    const banner = document.getElementById('roundBanner'); if (isTournamentMode) { banner.style.display = 'block'; banner.innerText = `Round ${currentRound}`; } else { banner.style.display = 'none'; }
    cancelAnimationFrame(animationId); marbles = []; pegs = []; cameraX = 0; cameraY = 0; frameCount = 0; raceOver = false; autoScrollEnabled = true; lastFinishedCount = 0; spectatedMarble = null;
    curArch.init(len); curArch.spawn(activeCompetitors); 
    
    checkpoints = []; checkpointCounts = []; checkpointAllowed = [];
    if(isKnockoutMode) {
        let cpSpace = parseInt(document.getElementById('cpInterval').value) || 2000; let cpElm = parseInt(document.getElementById('cpElim').value) || 2;
        let surv = activeCompetitors.length; let yy = 1500;
        while(yy < boundY - 50 && surv > 1) { checkpoints.push(yy); checkpointCounts.push(0); surv = Math.max(1, surv - cpElm); checkpointAllowed.push(surv); yy += cpSpace; }
    }
    raceStartTime = performance.now(); animate();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); frameCount++;
    document.getElementById('gameTimer').innerText = formatTimePrecise(performance.now() - raceStartTime);
    
    let sorted = [...marbles].sort((a, b) => { if ((a.finished||a.eliminated) && (b.finished||b.eliminated)) return a.finishRank - b.finishRank; if (a.finished||a.eliminated) return -1; if (b.finished||b.eliminated) return 1; return curArch.getProgress(b) - curArch.getProgress(a); });
    if (frameCount % 20 === 0 && !marbles.every(m=>m.finished||m.eliminated)) { sorted.forEach((m, i) => m.history.push(m.finished||m.eliminated ? m.finishRank : i + 1)); }
    
    if(spectatedMarble && (spectatedMarble.finished || spectatedMarble.eliminated)) spectatedMarble = null;
    let activeLeader = sorted.find(m => !m.finished && !m.eliminated) || sorted[0]; let camT = curArch.camTarget(spectatedMarble || activeLeader); 
    cameraX += (Math.min(Math.max(0, camT.x), Math.max(0, boundX - canvas.width)) - cameraX) * 0.1; cameraY += (Math.min(Math.max(0, camT.y), Math.max(0, boundY - canvas.height)) - cameraY) * 0.1;
    
    ctx.save(); ctx.translate(-cameraX, -cameraY); ctx.strokeStyle = curTheme.lines; ctx.lineWidth = 3;
    if(!isKnockoutMode && curArch.drawFinish) curArch.drawFinish();
    if(isKnockoutMode) { checkpoints.forEach((cy, i) => { ctx.setLineDash([5,5]); ctx.strokeStyle='#f43f5e'; ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(boundX, cy); ctx.stroke(); ctx.fillStyle='#f43f5e'; ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.fillText(`CHECKPOINT ${i+1} (Top ${checkpointAllowed[i]} Survive)`, boundX/2, cy+20); ctx.setLineDash([]); }); }
    
    pegs.forEach(p => { if (p.x > cameraX-20 && p.x < cameraX+canvas.width+20 && p.y > cameraY-20 && p.y < cameraY+canvas.height+20) p.draw(); });
    marbles.forEach(m => { m.update(); pegs.forEach(p => resolveCollision(m, p)); marbles.forEach(o => { if (m !== o && !m.finished && !o.finished && !m.eliminated && !o.eliminated) { let dx = o.x - m.x; let dy = o.y - m.y; let dist = Math.sqrt(dx*dx + dy*dy); if (dist < m.radius + o.radius) { let tX = m.vx; let tY = m.vy; m.vx = o.vx*RESTITUTION; m.vy = o.vy*RESTITUTION; o.vx = tX*RESTITUTION; o.vy = tY*RESTITUTION; let overlap = (m.radius + o.radius) - dist; m.x -= (dx/dist)*(overlap/2); m.y -= (dy/dist)*(overlap/2); m.x += (Math.random()-0.5)*0.2; } } }); m.draw(); });
    ctx.restore();
    
    if (frameCount % 5 === 0) { 
        document.getElementById('lbContent').innerHTML = sorted.map((m, i) => `<div class="lb-item ${m.eliminated?'eliminated':''}" onclick="spectate(${m.id})" style="${spectatedMarble===m?'border-color:#00ffcc':''}"><div class="lb-rank">${m.finished||m.eliminated ? m.finishRank : i+1}.</div><div class="lb-color" style="background:${m.color}"></div><div class="lb-name">${m.name} ${m.finished ? "🏁" : ""} ${m.eliminated ? "❌" : ""}</div><div class="lb-time">${m.finishTime ? formatTimePrecise(m.finishTime) : formatTimePrecise(performance.now() - raceStartTime)}</div></div>`).join(''); 
        let currentFinishedCount = marbles.filter(m => m.finished || m.eliminated).length;
        if (currentFinishedCount > lastFinishedCount) { lastFinishedCount = currentFinishedCount; if (autoScrollEnabled) { let fIdx = sorted.findIndex(m => !m.finished && !m.eliminated); if (fIdx !== -1) { const lbWrap = document.getElementById('lbContentWrapper'); lbWrap.scrollTo({ top: fIdx * 45 - (lbWrap.clientHeight / 3), behavior: 'smooth' }); } } }
    }
    if (!raceOver) animationId = requestAnimationFrame(animate);
}

function endRace() {
    raceOver = true; if(isRecording) toggleRecording(); document.getElementById('gameUI').style.display = 'none'; document.getElementById('postRaceUI').style.display = 'block'; 
    let sortedRef = [...marbles].sort((a,b) => a.finishRank - b.finishRank); let winner = sortedRef[0]; drawGraph();
    
    let validF = sortedRef.filter(m => m.finished && !m.eliminated); let cfHTML = "No finishers.";
    if(validF.length >= 1) cfHTML = `<div style="color:#00ffcc;">1. ${validF[0].name} (${formatTimePrecise(validF[0].finishTime)})</div>`;
    if(validF.length >= 2) cfHTML += `<div style="color:#fbbf24;">2. ${validF[1].name} (+${((validF[1].finishTime - validF[0].finishTime)/1000).toFixed(6)}s)</div>`;
    if(validF.length >= 3) cfHTML += `<div style="color:#f43f5e;">3. ${validF[2].name} (+${((validF[2].finishTime - validF[1].finishTime)/1000).toFixed(6)}s)</div>`;
    document.getElementById('closestFinishes').innerHTML = cfHTML;

    if (!isTournamentMode) { document.getElementById('postRaceTitle').innerText = "Race Complete!"; document.getElementById('winnerText').innerHTML = `🥇 1st Place: <span style="color:${winner.color}">${winner.name}</span>`; document.getElementById('tournamentResults').style.display = 'none'; document.getElementById('nextRoundBtn').style.display = 'none'; return; }
    
    let elimStr = document.getElementById('eliminationPattern').value; let elimArr = elimStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0); if(elimArr.length === 0) elimArr = [1];
    let toEliminate = elimArr[currentRound - 1] || elimArr[elimArr.length - 1]; let nextCount = Math.max(1, activeCompetitors.length - toEliminate);
    let advancingMarbles = sortedRef.slice(0, nextCount); let eliminatedMarbles = sortedRef.slice(nextCount);
    
    document.getElementById('tournamentResults').style.display = 'grid'; document.getElementById('advancingList').innerHTML = advancingMarbles.map(m => `<div>${m.finishRank}. ${m.name}</div>`).join(''); document.getElementById('eliminatedList').innerHTML = eliminatedMarbles.map(m => `<div>${m.finishRank}. ${m.name}</div>`).join('');
    if (nextCount === 1) { document.getElementById('postRaceTitle').innerText = "TOURNAMENT COMPLETE!"; document.getElementById('winnerText').innerHTML = `👑 GRAND CHAMPION: <span style="color:${advancingMarbles[0].color}">${advancingMarbles[0].name}</span> 👑`; document.getElementById('nextRoundBtn').style.display = 'none'; } else { document.getElementById('postRaceTitle').innerText = `Round ${currentRound} Complete!`; document.getElementById('winnerText').innerHTML = `${eliminatedMarbles.length} Marbles Eliminated.`; document.getElementById('nextRoundBtn').style.display = 'block'; document.getElementById('nextRoundBtn').innerText = nextCount === 2 ? "Start GRAND FINALE" : `Start Round ${currentRound + 1}`; activeCompetitors = advancingMarbles.map(m => m.dataRef); }
}

function drawGraph() { const gCanvas = document.getElementById('graphCanvas'); const gCtx = gCanvas.getContext('2d'); gCtx.clearRect(0,0, gCanvas.width, gCanvas.height); const w = gCanvas.width; const h = gCanvas.height; const pad = 20; const num = marbles.length; gCtx.strokeStyle = '#334155'; gCtx.lineWidth = 1; for(let i=1; i<=num; i++) { let y = pad + ((i-1) / (num-1 || 1)) * (h - pad*2); gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(w, y); gCtx.stroke(); } const legend = document.getElementById('graphLegend'); legend.innerHTML = ''; marbles.sort((a,b) => a.finishRank - b.finishRank).forEach(m => { gCtx.strokeStyle = m.color; gCtx.lineWidth = 3; gCtx.lineJoin = 'round'; gCtx.beginPath(); m.history.forEach((rank, step) => { let x = pad + (step / Math.max(1, m.history.length-1)) * (w - pad*2); let y = pad + ((rank-1) / (num-1 || 1)) * (h - pad*2); step === 0 ? gCtx.moveTo(x, y) : gCtx.lineTo(x, y); }); gCtx.stroke(); legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${m.color}"></div>${m.finishRank}. ${m.name}</div>`; }); }
function abortRace() { cancelAnimationFrame(animationId); if(isRecording) toggleRecording(); fullReset(); } function fullReset() { document.getElementById('postRaceUI').style.display = 'none'; document.getElementById('gameUI').style.display = 'none'; document.getElementById('setupMenu').style.display = 'block'; }
initUI();
</script>
