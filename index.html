<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Race: Ultimate Edition</title>
    <style>
        body { margin: 0; background: #0f1115; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        h1 { margin: 15px 0 5px 0; font-size: 28px; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px;}
        .panel { background: #1e222a; padding: 20px 30px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-top: 10px; margin-bottom: 20px; max-width: 900px; width: 95%; display: none; }
        #setupMenu { display: block; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group { text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #444; border-radius: 4px; background: #111; color: #fff; font-size: 14px; box-sizing: border-box; }
        .form-group textarea { resize: vertical; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #00ffcc; background: #111; padding: 10px; border-radius: 5px; border: 1px solid #444;}
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }
        .marble-header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 10px; border-top: 1px solid #333; padding-top: 15px;}
        .marble-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 5px; margin-bottom: 15px;}
        .marble-row { display: grid; grid-template-columns: 30px 50px 1fr 120px 40px; gap: 10px; align-items: center; background: #2a2f3a; padding: 6px 10px; border-radius: 6px; }
        .marble-row input[type="color"] { width: 100%; height: 35px; border: none; cursor: pointer; background: transparent; padding: 0;}
        .marble-row input[type="text"] { width: 100%; padding: 6px; border: 1px solid #444; border-radius: 4px; background: #111; color: #fff;}
        .btn { background: #00ffcc; color: #121212; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { background: #ffffff; box-shadow: 0 0 15px #00ffcc; }
        .btn-small { padding: 6px 10px; font-size: 12px; }
        .btn-danger { background: #ff3366; color: #fff; }
        .btn-danger:hover { background: #ff6688; box-shadow: 0 0 15px #ff3366; }
        .btn-primary { background: #ffcc00; font-size: 18px; padding: 15px;}
        #gameUI { background: transparent; border: none; box-shadow: none; max-width: 1200px; }
        #gameWrapper { display: flex; gap: 20px; justify-content: center; width: 100%; }
        .canvas-container { position: relative; }
        canvas { background-size: cover; background-position: center; border: 4px solid #333; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #roundBanner { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #ffcc00; padding: 8px 15px; border-radius: 5px; font-weight: bold; border: 1px solid #ffcc00; z-index: 10; }
        #liveLeaderboard { width: 250px; background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; max-height: 700px; overflow-y: hidden; }
        .lb-item { display: flex; align-items: center; padding: 5px; margin-bottom: 5px; background: #222; border-radius: 4px; font-size: 14px; font-weight: bold;}
        .lb-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 10px; border: 1px solid #fff;}
        .lb-rank { width: 25px; color: #aaa; }
        .lb-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #graphCanvas { background: #111; width: 100%; height: 300px; border-radius: 8px; margin-top: 15px; border: 1px solid #444;}
        .graph-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; justify-content: center; font-size: 12px;}
        .legend-item { display: flex; align-items: center; gap: 5px;}
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }
        .tournament-results { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333;}
    </style>
</head>
  <body>
    <h1>Marble Race: Ultimate Edition</h1>

    <div id="setupMenu" class="panel">
        <div class="settings-grid">
            <div class="form-group"><label>Virtual Map Length/Size (Pixels)</label><input type="number" id="trackLength" value="5000" min="1000" max="50000"></div>
            <div class="form-group"><label>Map Architecture (Physics & Layout)</label><select id="mapArchitectureSelect"></select></div>
            <div class="form-group"><label>Visual Theme Backgrounds</label><select id="trackDesignSelect" onchange="updateCustomBgState()"></select></div>
            <div class="form-group"><label>Custom Map Background (Overrides Theme)</label><input type="file" id="customBgUpload" accept="image/*" onchange="handleBgUpload(event)"></div>
        </div>

        <div class="form-group">
            <label class="checkbox-group"><input type="checkbox" id="tournamentToggle" onchange="toggleTournament()"> Enable Multi-Round Elimination Tournament</label>
            <div id="tournamentSettings" style="display:none; margin-top: 10px; background: #222; padding: 15px; border-radius: 5px;">
                <label>Elimination Pattern (e.g., "2, 1, 3")</label><input type="text" id="eliminationPattern" value="2, 1, 1" placeholder="Comma separated numbers">
            </div>
        </div>

        <div class="settings-grid" style="margin-bottom: 0;">
            <div class="form-group">
                <label>Bulk Add Marbles (Paste list, 1 per line)</label>
                <textarea id="bulkAddList" rows="4" placeholder="Red Team&#10;Blue Team&#10;Green Team"></textarea>
                <button class="btn btn-small" onclick="addBulkMarbles()" style="margin-top: 5px; width: 100%;">+ Bulk Add List</button>
            </div>
            <div class="form-group"><label>Or Start With a Roster Template</label><select id="templateSelect" size="4" style="height: 85px;" onchange="applyTemplate()"></select></div>
        </div>

        <div class="marble-header">
            <div style="font-size: 15px; font-weight:bold; color: #00ffcc;">Competitors (<span id="marbleCountDisplay">8</span>)</div>
            <div>
                <button class="btn btn-small btn-add" onclick="addMarble()">+ Add 1</button>
                <button class="btn btn-small" onclick="randomizeAllColors()" style="background:#ffcc00;">🎲 Random Colors</button>
                <button class="btn btn-small btn-danger" onclick="clearMarbles()">🗑️ Clear All</button>
            </div>
        </div>
        
        <div class="marble-list" id="marbleList"></div>
        <button class="btn btn-primary" onclick="startTournament()" style="width: 100%; margin-top: 10px;">🚀 GENERATE MAP & START RACE! 🚀</button>
    </div>

    <div id="gameUI" class="panel">
        <div style="margin-bottom: 10px;"><button class="btn btn-danger btn-small" onclick="abortRace()">Abort Race</button></div>
        <div id="gameWrapper">
            <div class="canvas-container">
                <div id="roundBanner" style="display:none;">Round 1</div>
                <canvas id="raceCanvas" width="500" height="700"></canvas>
            </div>
            <div id="liveLeaderboard">
                <div class="lb-title" style="text-align: center; font-weight: bold; color: #00ffcc; margin-bottom: 10px; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 5px;">LIVE STANDINGS</div>
                <div id="lbContent"></div>
            </div>
        </div>
    </div>

    <div id="postRaceUI" class="panel">
        <h2 style="color: #00ffcc; text-align: center; margin-top: 0;" id="postRaceTitle">Race Complete!</h2>
        <h3 id="winnerText" style="text-align: center; margin-bottom: 5px;"></h3>
        
        <div id="tournamentResults" class="tournament-results" style="display: none;">
            <div style="background: #222; padding: 10px; border-radius: 5px;">
                <h4 style="color: #00ffcc; margin: 0 0 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px;">Advance to Next Round</h4><div id="advancingList"></div>
            </div>
            <div style="background: #222; padding: 10px; border-radius: 5px;">
                <h4 style="color: #ff3366; margin: 0 0 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px;">Eliminated</h4><div id="eliminatedList"></div>
            </div>
        </div>

        <label style="color:#aaa; font-weight:bold; display:block; margin-top:20px;">Placement History Tracker</label>
        <canvas id="graphCanvas" width="800" height="300"></canvas>
        <div class="graph-legend" id="graphLegend"></div>
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
            <button class="btn btn-danger" onclick="fullReset()">Exit to Main Menu</button>
            <button class="btn" id="nextRoundBtn" style="display:none;" onclick="startNextRound()">Start Next Round!</button>
        </div>
    </div>
    <script>
const GRAVITY = 0.18; const RESTITUTION = 0.55; 
const canvas = document.getElementById('raceCanvas'); const ctx = canvas.getContext('2d');

const trackDesigns = [
    { name: "1. Classic Dark", bg: "#0a0a0a", lines: "#00ffcc", pegs: "#555555" }, { name: "2. Matrix", bg: "#001100", lines: "#00ff00", pegs: "#004400" },
    { name: "3. Synthwave", bg: "linear-gradient(to bottom, #2b00ff, #ff007c)", lines: "#00ffff", pegs: "#ffffff" }, { name: "4. Deep Ocean", bg: "#000b18", lines: "#ffffff", pegs: "#0077ff" },
    { name: "5. Lava Pool", bg: "#220000", lines: "#ff4400", pegs: "#ffcc00" }, { name: "6. Blizzard", bg: "#eef2f5", lines: "#88ccff", pegs: "#999999" },
    { name: "7. Desert Sands", bg: "#d2b48c", lines: "#8b4513", pegs: "#228b22" }, { name: "8. Emerald Forest", bg: "#002200", lines: "#00ff44", pegs: "#8b4513" },
    { name: "9. Deep Space", bg: "radial-gradient(circle, #1a0033, #000000)", lines: "#ffffff", pegs: "#aa00ff" }, { name: "10. Sunset Drive", bg: "linear-gradient(to bottom, #ff5500, #aa00ff)", lines: "#ffee00", pegs: "#330033" },
    { name: "11. Cyberpunk City", bg: "#fcee0a", lines: "#000000", pegs: "#ff0055" }, { name: "12. Retro Arcade", bg: "#000033", lines: "#ff00ff", pegs: "#00ffff" },
    { name: "13. Royal Velvet", bg: "#4a0010", lines: "#ffd700", pegs: "#ffd700" }, { name: "14. Monochrome", bg: "#ffffff", lines: "#000000", pegs: "#000000" },
    { name: "15. Cotton Candy", bg: "#ffccdd", lines: "#ff00aa", pegs: "#ffffff" }, { name: "16. Toxic Spill", bg: "#1a1a1a", lines: "#aaff00", pegs: "#ccff00" },
    { name: "17. Obsidian Volcano", bg: "#111111", lines: "#ff0000", pegs: "#333333" }, { name: "18. Midnight Moon", bg: "#00001a", lines: "#c0c0c0", pegs: "#add8e6" },
    { name: "19. Autumn Leaves", bg: "#3b0918", lines: "#ff8c00", pegs: "#a52a2a" }, { name: "20. Blueprint", bg: "#003366", lines: "#ffffff", pegs: "#ffffff" }
];

const templates = {
    "Default Colors": ["Ruby:#ff0055", "Cyan:#00ffcc", "Gold:#ffcc00", "Amethyst:#9900ff", "Emerald:#00ff00", "Cobalt:#0066ff", "Pearl:#ffffff", "Obsidian:#333333"],
    "Countries A": ["USA:#0033a0", "Japan:#bc002d", "Brazil:#009c3b", "Germany:#ffce00", "France:#0055a4", "India:#ff9933", "Canada:#ff0000", "UK:#012169"],
    "The Solar System": ["Mercury:#888888", "Venus:#e3bb76", "Earth:#2b82c9", "Mars:#c1440e", "Jupiter:#d39c7e", "Saturn:#f3d17d", "Uranus:#4b70dd", "Neptune:#274687"],
    "Elements": ["Fire:#ff3300", "Water:#0066ff", "Earth:#44aa00", "Wind:#ccffff", "Lightning:#ffee00", "Ice:#00ffff", "Metal:#aaaaaa", "Shadow:#222222"]
};

function spawnGrid(comps, mode) {
    let cols = Math.min(12, comps.length);
    comps.forEach((data, i) => {
        let r = Math.floor(i / cols); let c = i % cols; let total = Math.min(cols, comps.length - r*cols); let x, y;
        if (mode === 'top') { x = (boundX/2) - ((total-1)*30/2) + c*30; y = 40 - r*25; }
        else if (mode === 'bottom') { x = (boundX/2) - ((total-1)*30/2) + c*30; y = boundY - 40 + r*25; }
        else if (mode === 'left') { y = (boundY/2) - ((total-1)*30/2) + c*30; x = 40 - r*25; }
        else if (mode === 'right') { y = (boundY/2) - ((total-1)*30/2) + c*30; x = boundX - 40 + r*25; }
        else if (mode === 'ring') { let angle = (i/comps.length) * Math.PI*2; let rad = (boundX/2)-50; x = boundX/2 + Math.cos(angle)*rad; y = boundY/2 + Math.sin(angle)*rad; }
        marbles.push(new Marble(x, y, data));
    });
}

function randPegs(countFactor, xs, xe, ys, ye, b=RESTITUTION) {
    let num = Math.floor((((xe-xs)*(ye-ys)) / 4000) * countFactor);
    for(let i=0; i<num; i++) pegs.push(new Peg(xs + Math.random()*(xe-xs), ys + Math.random()*(ye-ys), Math.random()*3+3, b));
}

const mapArchitectures = [
    { name: "1. Classic Vertical Drop", init: (len) => { boundX = 500; boundY = len; randPegs(1, 20, 480, 150, boundY-150); }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: 0, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, boundY-50); ctx.lineTo(boundX, boundY-50); ctx.stroke(); } },
    { name: "2. Horizontal Dash (Left to Right)", init: (len) => { boundX = len; boundY = 700; randPegs(1, 150, boundX-150, 20, 680); }, spawn: (c) => spawnGrid(c, 'left'), getGravity: () => ({x: GRAVITY, y: 0}), checkFinish: (m) => m.x > boundX - 50, getProgress: (m) => m.x, camTarget: (l) => ({ x: l.x - 250, y: 0 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(boundX-50, 0); ctx.lineTo(boundX-50, boundY); ctx.stroke(); } },
    { name: "3. Reverse Dash (Right to Left)", init: (len) => { boundX = len; boundY = 700; randPegs(1, 150, boundX-150, 20, 680); }, spawn: (c) => spawnGrid(c, 'right'), getGravity: () => ({x: -GRAVITY, y: 0}), checkFinish: (m) => m.x < 50, getProgress: (m) => -m.x, camTarget: (l) => ({ x: l.x - 250, y: 0 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(50, 0); ctx.lineTo(50, boundY); ctx.stroke(); } },
    { name: "4. Anti-Gravity Ascension", init: (len) => { boundX = 500; boundY = len; randPegs(1, 20, 480, 150, boundY-150); }, spawn: (c) => spawnGrid(c, 'bottom'), getGravity: () => ({x: 0, y: -GRAVITY}), checkFinish: (m) => m.y < 50, getProgress: (m) => -m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, 50); ctx.lineTo(boundX, 50); ctx.stroke(); } },
    { name: "5. The Black Hole", init: (len) => { boundX = 1500; boundY = 1500; randPegs(0.8, 100, 1400, 100, 1400); }, spawn: (c) => spawnGrid(c, 'ring'), getGravity: (m) => { let dx = 750 - m.x, dy = 750 - m.y; let dist = Math.sqrt(dx*dx + dy*dy) || 1; return { x: (dx/dist)*GRAVITY*1.5, y: (dy/dist)*GRAVITY*1.5 }; }, checkFinish: (m) => Math.sqrt((750-m.x)**2 + (750-m.y)**2) < 40, getProgress: (m) => -Math.sqrt((750-m.x)**2 + (750-m.y)**2), camTarget: (l) => ({ x: l.x - 250, y: l.y - 350 }), drawFinish: () => { ctx.beginPath(); ctx.arc(750, 750, 40, 0, Math.PI*2); ctx.fillStyle='rgba(0,255,204,0.3)'; ctx.fill(); ctx.stroke(); } },
    { name: "6. Tornado Alley", init: (len) => { boundX = 500; boundY = len; randPegs(0.5, 20, 480, 150, boundY-150); }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: Math.sin(frameCount/20)*0.35, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, boundY-50); ctx.lineTo(boundX, boundY-50); ctx.stroke(); } },
    { name: "7. Pinball Bouncers", init: (len) => { boundX = 500; boundY = len; randPegs(0.6, 20, 480, 150, boundY-150, 1.3); }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: 0, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, boundY-50); ctx.lineTo(boundX, boundY-50); ctx.stroke(); } },
    { name: "8. The Funnel", init: (len) => { boundX = 500; boundY = len; for(let y=300; y<boundY-200; y+=500) { for(let i=0; i<20; i++) { pegs.push(new Peg(0 + i*10, y + i*15, 6, RESTITUTION)); pegs.push(new Peg(500 - i*10, y + i*15, 6, RESTITUTION)); } } }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: 0, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, boundY-50); ctx.lineTo(boundX, boundY-50); ctx.stroke(); } },
    { name: "9. Zig-Zag Maze", init: (len) => { boundX = 500; boundY = len; let left = true; for(let y=200; y<boundY-200; y+=350) { let sx = left ? 0 : 150, ex = left ? 350 : 500; for(let x=sx; x<=ex; x+=15) pegs.push(new Peg(x, y + (x-sx)*(left?0.3:-0.3), 6, RESTITUTION)); left = !left; } }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: 0, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, boundY-50); ctx.lineTo(boundX, boundY-50); ctx.stroke(); } },
    { name: "10. Plinko Pyramid", init: (len) => { boundX = 500; boundY = len; for (let y = 150; y < boundY - 150; y += 45) { let sX = (y % 90 === 0) ? 20 : 40; for (let x = sX; x < boundX - 20; x += 45) pegs.push(new Peg(x, y, 5, RESTITUTION)); } }, spawn: (c) => spawnGrid(c, 'top'), getGravity: () => ({x: 0, y: GRAVITY}), checkFinish: (m) => m.y > boundY - 50, getProgress: (m) => m.y, camTarget: (l) => ({ x: 0, y: l.y - 420 }), drawFinish: () => { ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0, boundY-50); ctx.lineTo(boundX, boundY-50); ctx.stroke(); } }
];

let masterCompetitorList = []; let activeCompetitors = []; let nextMarbleId = 0; let customBackgroundImage = null;
let isTournamentMode = false; let currentRound = 1; let marbles = []; let pegs = []; let boundX = 500; let boundY = 5000;
let raceOver = false; let cameraX = 0; let cameraY = 0; let animationId; let frameCount = 0; let curTheme = trackDesigns[0]; let curArch = mapArchitectures[0];

function initUI() {
    const ds = document.getElementById('trackDesignSelect'); trackDesigns.forEach((d, i) => ds.innerHTML += `<option value="${i}">${d.name}</option>`);
    const arch = document.getElementById('mapArchitectureSelect'); mapArchitectures.forEach((a, i) => arch.innerHTML += `<option value="${i}">${a.name}</option>`);
    const ts = document.getElementById('templateSelect'); Object.keys(templates).forEach(key => ts.innerHTML += `<option value="${key}">${key}</option>`);
    applyTemplate('Default Colors');
}
function applyTemplate(forceKey = null) {
    const key = forceKey || document.getElementById('templateSelect').value; if (!templates[key]) return;
    masterCompetitorList = []; nextMarbleId = 0;
    templates[key].forEach(item => { let [name, color] = item.split(':'); masterCompetitorList.push({ id: nextMarbleId++, name, color, img: null }); }); renderMarbleList();
}
function addBulkMarbles() {
    let list = document.getElementById('bulkAddList').value.split('\n'); let added = 0;
    list.forEach(name => { name = name.trim(); if (name) { masterCompetitorList.push({ id: nextMarbleId++, name, color: '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'), img: null }); added++; } });
    if(added > 0) { document.getElementById('bulkAddList').value = ''; renderMarbleList(); }
}
function renderMarbleList() {
    const list = document.getElementById('marbleList'); list.innerHTML = '';
    masterCompetitorList.forEach((comp, index) => {
        list.innerHTML += `<div class="marble-row"><span style="color:#aaa; font-weight:bold;">${index+1}.</span><input type="color" onchange="masterCompetitorList.find(c=>c.id===${comp.id}).color=this.value" value="${comp.color}"><input type="text" onchange="masterCompetitorList.find(c=>c.id===${comp.id}).name=this.value" value="${comp.name}" placeholder="Name"><input type="file" accept="image/*" style="font-size:11px; max-width:120px;" onchange="handleImg(event, ${comp.id})"><button class="btn btn-danger btn-small" onclick="removeMarble(${comp.id})">X</button></div>`;
    }); document.getElementById('marbleCountDisplay').innerText = masterCompetitorList.length;
}
function handleImg(e, id) { let file = e.target.files[0]; if (file) { let r = new FileReader(); r.onload = ev => { let img = new Image(); img.src = ev.target.result; masterCompetitorList.find(c => c.id === id).img = img; }; r.readAsDataURL(file); } else masterCompetitorList.find(c => c.id === id).img = null; }
function handleBgUpload(e) { let f = e.target.files[0]; if (f) { let r = new FileReader(); r.onload = ev => customBackgroundImage = `url(${ev.target.result})`; r.readAsDataURL(f); } else customBackgroundImage = null; }
function updateCustomBgState() { customBackgroundImage = null; document.getElementById('customBgUpload').value = ""; }
function addMarble() { masterCompetitorList.push({ id: nextMarbleId++, name: `Racer ${nextMarbleId}`, color: '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'), img: null }); renderMarbleList(); }
function removeMarble(id) { masterCompetitorList = masterCompetitorList.filter(c => c.id !== id); renderMarbleList(); }
function clearMarbles() { masterCompetitorList = []; renderMarbleList(); }
function randomizeAllColors() { masterCompetitorList.forEach(c => c.color = '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')); renderMarbleList(); }
function toggleTournament() { document.getElementById('tournamentSettings').style.display = document.getElementById('tournamentToggle').checked ? 'block' : 'none'; }

class Marble {
    constructor(x, y, data) { this.x = x; this.y = y; this.vx = (Math.random()-0.5)*3; this.vy = (Math.random()-0.5)*3; this.radius = 10; this.color = data.color; this.name = data.name; this.img = data.img; this.dataRef = data; this.finished = false; this.finishRank = 0; this.history = []; this.progressHistory = []; }
    update() {
        if (this.finished) return;
        let grav = curArch.getGravity(this); this.vx += grav.x + (Math.random()-0.5)*0.02; this.vy += grav.y + (Math.random()-0.5)*0.02; this.vx *= 0.99; this.vy *= 0.99; this.x += this.vx; this.y += this.vy;
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -RESTITUTION; } else if (this.x + this.radius > boundX) { this.x = boundX - this.radius; this.vx *= -RESTITUTION; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -RESTITUTION; } else if (this.y + this.radius > boundY) { this.y = boundY - this.radius; this.vy *= -RESTITUTION; }
        let prog = curArch.getProgress(this); this.progressHistory.push(prog);
        if (this.progressHistory.length > 90) { let oldProg = this.progressHistory.shift(); if (Math.abs(prog - oldProg) < 5) { this.vx = (Math.random()-0.5)*12; this.vy = (Math.random()-0.5)*12; this.progressHistory = []; } }
        if (curArch.checkFinish(this)) { this.finished = true; this.finishRank = marbles.filter(m => m.finished).length; if (this.finishRank === marbles.length) setTimeout(endRace, 1000); }
    }
    draw() {
        ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        if (this.img && this.img.complete) { ctx.clip(); ctx.drawImage(this.img, this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2); } else { ctx.fillStyle = this.color; ctx.fill(); ctx.beginPath(); ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill(); }
        ctx.restore(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.strokeStyle = '#000'; ctx.stroke(); ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.fillText(this.name, this.x, this.y - this.radius - 4);
    }
}
class Peg { constructor(x, y, radius, bounce=RESTITUTION) { this.x = x; this.y = y; this.radius = radius; this.bounce = bounce; } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = curTheme.pegs; ctx.fill(); } }
function resolveCollision(marble, peg) { let dx = marble.x - peg.x; let dy = marble.y - peg.y; let dist = Math.sqrt(dx*dx + dy*dy); let minDist = marble.radius + peg.radius; if (dist < minDist) { let overlap = minDist - dist; marble.x += (dx/dist)*overlap; marble.y += (dy/dist)*overlap; let p = 2 * (marble.vx*(dx/dist) + marble.vy*(dy/dist)); marble.vx = ((marble.vx - p*(dx/dist)) * peg.bounce) + (Math.random()-0.5)*0.5; marble.vy = ((marble.vy - p*(dy/dist)) * peg.bounce) + (Math.random()-0.5)*0.5; } }
function startTournament() { if (masterCompetitorList.length < 2) return alert("Add at least 2 marbles!"); activeCompetitors = [...masterCompetitorList]; isTournamentMode = document.getElementById('tournamentToggle').checked; currentRound = 1; startRaceEngine(); }
function startNextRound() { currentRound++; startRaceEngine(); }
function startRaceEngine() {
    let len = parseInt(document.getElementById('trackLength').value) || 5000; curTheme = trackDesigns[document.getElementById('trackDesignSelect').value]; curArch = mapArchitectures[document.getElementById('mapArchitectureSelect').value];
    canvas.style.background = customBackgroundImage ? customBackgroundImage : curTheme.bg; document.getElementById('setupMenu').style.display = 'none'; document.getElementById('postRaceUI').style.display = 'none'; document.getElementById('gameUI').style.display = 'flex';
    const banner = document.getElementById('roundBanner'); if (isTournamentMode) { banner.style.display = 'block'; banner.innerText = `Round ${currentRound}`; } else { banner.style.display = 'none'; }
    cancelAnimationFrame(animationId); marbles = []; pegs = []; cameraX = 0; cameraY = 0; frameCount = 0; raceOver = false; curArch.init(len); curArch.spawn(activeCompetitors); animate();
}
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); frameCount++;
    let sorted = [...marbles].sort((a, b) => { if (a.finished && b.finished) return a.finishRank - b.finishRank; if (a.finished) return -1; if (b.finished) return 1; return curArch.getProgress(b) - curArch.getProgress(a); });
    if (frameCount % 20 === 0 && !marbles.every(m=>m.finished)) { sorted.forEach((m, i) => m.history.push(m.finished ? m.finishRank : i + 1)); }
    let activeLeader = sorted.find(m => !m.finished) || sorted[0]; let camT = curArch.camTarget(activeLeader); cameraX += (Math.min(Math.max(0, camT.x), Math.max(0, boundX - canvas.width)) - cameraX) * 0.1; cameraY += (Math.min(Math.max(0, camT.y), Math.max(0, boundY - canvas.height)) - cameraY) * 0.1;
    ctx.save(); ctx.translate(-cameraX, -cameraY); ctx.strokeStyle = curTheme.lines; ctx.lineWidth = 3; if(curArch.drawFinish) curArch.drawFinish();
    pegs.forEach(p => { if (p.x > cameraX-20 && p.x < cameraX+canvas.width+20 && p.y > cameraY-20 && p.y < cameraY+canvas.height+20) p.draw(); });
    marbles.forEach(m => { m.update(); pegs.forEach(p => resolveCollision(m, p)); marbles.forEach(o => { if (m !== o && !m.finished && !o.finished) { let dx = o.x - m.x; let dy = o.y - m.y; let dist = Math.sqrt(dx*dx + dy*dy); if (dist < m.radius + o.radius) { let tX = m.vx; let tY = m.vy; m.vx = o.vx*RESTITUTION; m.vy = o.vy*RESTITUTION; o.vx = tX*RESTITUTION; o.vy = tY*RESTITUTION; let overlap = (m.radius + o.radius) - dist; m.x -= (dx/dist)*(overlap/2); m.y -= (dy/dist)*(overlap/2); } } }); m.draw(); });
    ctx.restore();
    if (frameCount % 5 === 0) { document.getElementById('lbContent').innerHTML = sorted.map((m, i) => `<div class="lb-item"><div class="lb-rank">${m.finished ? m.finishRank : i+1}.</div><div class="lb-color" style="background:${m.color}"></div><div class="lb-name">${m.name} ${m.finished ? "🏁" : ""}</div></div>`).join(''); }
    if (!raceOver) animationId = requestAnimationFrame(animate);
}
function endRace() {
    raceOver = true; document.getElementById('gameUI').style.display = 'none'; document.getElementById('postRaceUI').style.display = 'block'; let sortedRef = [...marbles].sort((a,b) => a.finishRank - b.finishRank); let winner = sortedRef[0]; drawGraph();
    if (!isTournamentMode) { document.getElementById('postRaceTitle').innerText = "Race Complete!"; document.getElementById('winnerText').innerHTML = `🥇 1st Place: <span style="color:${winner.color}">${winner.name}</span>`; document.getElementById('tournamentResults').style.display = 'none'; document.getElementById('nextRoundBtn').style.display = 'none'; return; }
    let elimStr = document.getElementById('eliminationPattern').value; let elimArr = elimStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0); if(elimArr.length === 0) elimArr = [1];
    let toEliminate = elimArr[currentRound - 1] || elimArr[elimArr.length - 1]; let nextCount = Math.max(1, activeCompetitors.length - toEliminate);
    let advancingMarbles = sortedRef.slice(0, nextCount); let eliminatedMarbles = sortedRef.slice(nextCount);
    document.getElementById('tournamentResults').style.display = 'grid'; document.getElementById('advancingList').innerHTML = advancingMarbles.map(m => `<div>${m.finishRank}. ${m.name}</div>`).join(''); document.getElementById('eliminatedList').innerHTML = eliminatedMarbles.map(m => `<div>${m.finishRank}. ${m.name}</div>`).join('');
    if (nextCount === 1) { document.getElementById('postRaceTitle').innerText = "TOURNAMENT COMPLETE!"; document.getElementById('winnerText').innerHTML = `👑 GRAND CHAMPION: <span style="color:${advancingMarbles[0].color}">${advancingMarbles[0].name}</span> 👑`; document.getElementById('nextRoundBtn').style.display = 'none'; } else { document.getElementById('postRaceTitle').innerText = `Round ${currentRound} Complete!`; document.getElementById('winnerText').innerHTML = `${eliminatedMarbles.length} Marbles Eliminated.`; document.getElementById('nextRoundBtn').style.display = 'block'; document.getElementById('nextRoundBtn').innerText = nextCount === 2 ? "Start GRAND FINALE" : `Start Round ${currentRound + 1}`; activeCompetitors = advancingMarbles.map(m => m.dataRef); }
}
function drawGraph() { const gCanvas = document.getElementById('graphCanvas'); const gCtx = gCanvas.getContext('2d'); gCtx.clearRect(0,0, gCanvas.width, gCanvas.height); const w = gCanvas.width; const h = gCanvas.height; const pad = 20; const num = marbles.length; gCtx.strokeStyle = '#333'; gCtx.lineWidth = 1; for(let i=1; i<=num; i++) { let y = pad + ((i-1) / (num-1 || 1)) * (h - pad*2); gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(w, y); gCtx.stroke(); } const legend = document.getElementById('graphLegend'); legend.innerHTML = ''; marbles.sort((a,b) => a.finishRank - b.finishRank).forEach(m => { gCtx.strokeStyle = m.color; gCtx.lineWidth = 3; gCtx.lineJoin = 'round'; gCtx.beginPath(); m.history.forEach((rank, step) => { let x = pad + (step / Math.max(1, m.history.length-1)) * (w - pad*2); let y = pad + ((rank-1) / (num-1 || 1)) * (h - pad*2); step === 0 ? gCtx.moveTo(x, y) : gCtx.lineTo(x, y); }); gCtx.stroke(); legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${m.color}"></div>${m.finishRank}. ${m.name}</div>`; }); }
function abortRace() { cancelAnimationFrame(animationId); fullReset(); } function fullReset() { document.getElementById('postRaceUI').style.display = 'none'; document.getElementById('gameUI').style.display = 'none'; document.getElementById('setupMenu').style.display = 'block'; }
initUI();
</script>
