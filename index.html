<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Race: Ultimate Powerup & Video Edition</title>
    <style>
        :root { --primary: #00ffcc; --bg: #05070a; --panel: rgba(15, 23, 42, 0.85); }
        body { margin: 0; background: var(--bg); background-image: radial-gradient(circle at top, #111827, #000); color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        h1 { margin: 25px 0 10px 0; font-size: 38px; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 20px rgba(0,255,204,0.5); text-align: center; font-weight: 900;}
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .panel { background: var(--panel); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px 40px; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); margin-top: 10px; margin-bottom: 25px; max-width: 950px; width: 95%; display: none; }
        #setupMenu { display: block; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 800; color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        /* Strict Android Input Overrides */
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #334155; border-radius: 10px; background-color: #1e293b !important; color: #ffffff !important; -webkit-text-fill-color: #ffffff !important; font-size: 15px; font-weight: bold; box-sizing: border-box; transition: 0.3s; opacity: 1 !important; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 12px rgba(0,255,204,0.4);}
        
        .checkbox-group { display: flex; align-items: center; gap: 12px; font-weight: bold; color: var(--primary); background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border: 1px solid #334155;}
        .checkbox-group input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary);}

        .powerup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 15px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid #334155; max-height: 250px; overflow-y: auto;}
        .powerup-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #fff;}
        .powerup-item input { width: 18px; height: 18px; accent-color: #fbbf24;}

        .marble-header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;}
        .marble-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 10px; margin-bottom: 20px;}
        .marble-row { display: grid; grid-template-columns: 40px 50px 1fr 120px 45px; gap: 12px; align-items: center; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 10px; border: 1px solid #334155; transition: 0.2s;}
        .marble-row input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; background: transparent; padding: 0;}
        
        .btn { background: var(--primary); color: #05070a; border: none; padding: 14px 28px; font-size: 14px; font-weight: 900; cursor: pointer; border-radius: 10px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; justify-content: center;}
        .btn:hover { background: #fff; box-shadow: 0 0 25px rgba(0,255,204,0.7); transform: translateY(-3px); }
        .btn-small { padding: 8px 14px; font-size: 12px; }
        .btn-danger { background: #f43f5e; color: #fff; }
        .btn-danger:hover { background: #fff; color: #f43f5e; box-shadow: 0 0 25px rgba(244,63,94,0.7); }
        .btn-primary { background: #fbbf24; font-size: 18px; padding: 18px; margin-top: 10px;}
        .btn-primary:hover { background: #fff; box-shadow: 0 0 30px rgba(251,191,36,0.8); }

        #gameUI { background: transparent; border: none; box-shadow: none; max-width: 1400px; padding: 0; }
        #gameWrapper { display: flex; gap: 25px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .canvas-container { position: relative; }
        canvas { background-size: cover; background-position: center; border: 4px solid #1e293b; border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        
        #roundBanner { position: absolute; top: 15px; left: 15px; background: rgba(15,23,42,0.95); color: #fbbf24; padding: 12px 25px; border-radius: 10px; font-weight: 900; border: 1px solid #fbbf24; z-index: 10; text-transform: uppercase; font-size: 18px;}

        #liveLeaderboard { width: 340px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; display: flex; flex-direction: column; max-height: 700px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        .lb-title { text-align: center; font-weight: 900; color: var(--primary); padding: 18px; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; letter-spacing: 2px; background: rgba(0,0,0,0.4); border-radius: 16px 16px 0 0;}
        #lbContentWrapper { overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; padding: 12px; flex: 1; }
        .lb-item { display: flex; align-items: center; padding: 10px 12px; margin-bottom: 8px; background: rgba(0,0,0,0.6); border-radius: 8px; font-size: 15px; font-weight: 700; border: 1px solid transparent; transition: 0.2s; cursor: pointer;}
        .lb-item.eliminated { opacity: 0.6; filter: grayscale(0.8); background: rgba(244, 63, 94, 0.2); border-color: rgba(244, 63, 94, 0.4);}
        .lb-color { width: 18px; height: 18px; border-radius: 50%; margin-right: 14px; border: 2px solid #fff; box-shadow: 0 0 8px rgba(0,0,0,0.6); flex-shrink: 0;}
        .lb-rank { width: 35px; color: #94a3b8; font-size: 14px;}
        .lb-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-time { font-family: 'Courier New', monospace; font-size: 13px; color: #fbbf24; font-weight: 900; }

        #graphCanvas { background: rgba(0,0,0,0.5); width: 100%; height: 400px; border-radius: 16px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1);}
        .graph-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; justify-content: center; font-size: 14px; font-weight: 700;}
        .legend-item { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 8px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);}
        .legend-color { width: 14px; height: 14px; border-radius: 50%; }
        .tournament-results { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 25px;}
    </style>
</head>
<body>
    <h1>Marble Race Pro</h1>

    <div id="setupMenu" class="panel">
        <div class="settings-grid">
            <div class="form-group"><label>Race Mode Types</label>
                <select id="raceModeSelect" onchange="toggleModes()">
                    <option value="classic">🏁 Classic Finish Line</option>
                    <option value="knockout">❌ Checkpoints (Knockout)</option>
                    <option value="suddendeath">☠️ Sudden Death (Time-Based)</option>
                    <option value="infection">🧟 Infection (Zombie Tag)</option>
                </select>
            </div>
            <div class="form-group"><label>Virtual Map Length/Size (Pixels)</label><input type="number" id="trackLength" value="7000" min="1000" max="100000"></div>
            <div class="form-group"><label>Map Architecture (30 Physics Layouts)</label><select id="mapArchitectureSelect"></select></div>
            <div class="form-group"><label>Visual Theme Backgrounds</label><select id="trackDesignSelect" onchange="updateCustomBgState()"></select></div>
        </div>

        <div id="knockoutSettings" style="display:none; margin-bottom: 20px; background: rgba(244,63,94,0.1); padding: 20px; border-radius: 12px; border: 1px solid rgba(244,63,94,0.3);">
            <label style="color: #f43f5e; font-weight:900; font-size:14px;">CHECKPOINT KNOCKOUT SETTINGS</label>
            <div style="display:flex; gap:15px; align-items:center; margin-top:10px; font-size:14px; font-weight:700;">
                Spawn <input type="number" id="cpCount" value="4" style="width:90px;"> Checkpoints. 
                Eliminate last <input type="number" id="cpElim" value="2" style="width:90px;"> at each.
            </div>
        </div>

        <div id="suddenDeathSettings" style="display:none; margin-bottom: 20px; background: rgba(139,92,246,0.1); padding: 20px; border-radius: 12px; border: 1px solid rgba(139,92,246,0.3);">
            <label style="color: #8b5cf6; font-weight:900; font-size:14px;">SUDDEN DEATH SETTINGS</label>
            <div style="display:flex; gap:15px; align-items:center; margin-top:10px; font-size:14px; font-weight:700;">
                Eliminate the last place marble every <input type="number" id="sdInterval" value="5" style="width:90px;"> seconds.
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label class="checkbox-group"><input type="checkbox" id="powerupToggle" onchange="togglePowerups()"> ⚡ ENABLE RANDOM POWERUPS (Select up to 20)</label>
            <div id="powerupMenu" style="display:none;">
                <div class="powerup-grid" id="powerupCheckboxGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <div class="settings-grid" style="margin-bottom: 0;">
            <div class="form-group" style="grid-column: span 2;">
                <label class="checkbox-group" style="background: rgba(251,191,36,0.15); border-color:#fbbf24; color:#fbbf24;">
                    <input type="checkbox" id="autoRecordToggle" checked> 🔴 AUTO-RECORD VIDEO (Saves directly to device when race ends)
                </label>
            </div>
            <div class="form-group">
                <label class="checkbox-group"><input type="checkbox" id="tournamentToggle" onchange="toggleModes()"> Enable Tournament Bracket</label>
                <div id="tournamentSettings" style="display:none; margin-top: 15px;">
                    <label style="color: #fbbf24;">Elimination Pattern (e.g., "4, 2, 1")</label>
                    <input type="text" id="eliminationPattern" value="4, 2, 1">
                </div>
            </div>
            <div class="form-group">
                <label>Bulk Import List (1 Name per line)</label>
                <textarea id="bulkAddList" rows="3" placeholder="Red Team&#10;Blue Team"></textarea>
                <button class="btn btn-small" onclick="addBulkMarbles()" style="margin-top: 10px; width: 100%; background:#38bdf8;">+ Import List</button>
            </div>
            <div class="form-group" style="grid-column: span 2;"><label>32-Marble Roster Templates</label><select id="templateSelect" size="5" style="height: 105px;" onchange="applyTemplate()"></select></div>
        </div>

        <div class="marble-header">
            <div style="font-size: 18px; font-weight:900; color: #00ffcc;">COMPETITORS (<span id="marbleCountDisplay">32</span>)</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-small btn-add" style="background:#38bdf8;" onclick="addMarble()">+ Add 1</button>
                <button class="btn btn-small" onclick="randomizeAllColors()" style="background:#fbbf24;">🎲 Colors</button>
                <button class="btn btn-small btn-danger" onclick="clearMarbles()">🗑️ Clear</button>
            </div>
        </div>
        
        <div class="marble-list" id="marbleList"></div>
        <button class="btn btn-primary" onclick="startTournament()" style="width: 100%; margin-top: 15px;">🚀 GENERATE MAP & START RACE! 🚀</button>
    </div>

    <div id="gameUI" class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:1100px; margin: 0 auto 20px auto; background:rgba(0,0,0,0.8); padding:15px 25px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); box-sizing:border-box;">
            <div><button class="btn btn-small" style="background:#8b5cf6; color:#fff;" onclick="spectateNearest()">👁️ Spectate Leader</button></div>
            <div style="font-family:'Courier New', monospace; font-size:32px; font-weight:900; color:var(--primary); text-shadow:0 0 15px rgba(0,255,204,0.6);" id="gameTimer">00:00.000</div>
            <div style="display:flex; gap:12px;"><button class="btn btn-small btn-danger" onclick="abortRace()">Abort Race</button></div>
        </div>
        <div id="gameWrapper">
            <div class="canvas-container">
                <div id="roundBanner" style="display:none;">Round 1</div>
                <canvas id="raceCanvas" width="500" height="700"></canvas>
            </div>
            <div id="liveLeaderboard">
                <div class="lb-title">LIVE STANDINGS</div>
                <div id="lbContentWrapper"><div id="lbContent"></div></div>
            </div>
        </div>
    </div>

    <div id="postRaceUI" class="panel">
        <h2 style="color: #00ffcc; text-align: center; margin-top: 0; font-size: 36px;" id="postRaceTitle">Race Complete!</h2>
        <h3 id="winnerText" style="text-align: center; margin-bottom: 15px; color: #fff; font-size: 24px;"></h3>
        
        <div style="background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid #38bdf8; margin-top: 20px; text-align:center;">
            <h4 style="color: #38bdf8; margin: 0 0 15px 0; text-transform: uppercase; font-size: 18px;">Top 5 Closest Finishes (Microsecond Δ)</h4>
            <div id="closestFinishes" style="font-family:'Courier New', monospace; font-size:16px; font-weight:900; line-height:1.8;"></div>
        </div>

        <div id="tournamentResults" class="tournament-results" style="display: none;">
            <div style="background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                <h4 style="color: #00ffcc; margin: 0 0 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Advance to Next Round</h4><div id="advancingList" style="line-height: 1.8; font-weight:700;"></div>
            </div>
            <div style="background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                <h4 style="color: #f43f5e; margin: 0 0 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Eliminated</h4><div id="eliminatedList" style="line-height: 1.8; color: #94a3b8; text-decoration: line-through; font-weight:700;"></div>
            </div>
        </div>

        <label style="color:#94a3b8; font-weight:800; display:block; margin-top:30px; text-transform: uppercase;">Placement History Tracker</label>
        <canvas id="graphCanvas" width="800" height="400"></canvas>
        <div class="graph-legend" id="graphLegend"></div>
        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 30px;">
            <button class="btn btn-danger" onclick="fullReset()">Exit to Main Menu</button>
            <button class="btn btn-primary" style="margin-top:0;" id="nextRoundBtn" style="display:none;" onclick="startNextRound()">Start Next Round!</button>
        </div>
    </div>

class PowerupOrb {
    constructor(x, y, typeObj) { this.x=x; this.y=y; this.radius=12; this.type=typeObj; this.active=true; }
    draw() { if(!this.active) return; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle=this.type.color; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#000'; ctx.font='12px Arial'; ctx.textAlign='center'; ctx.fillText(this.type.icon, this.x, this.y+4); }
}

class Marble {
    constructor(x, y, data) { this.x = x; this.y = y; this.vx = (Math.random()-0.5)*3; this.vy = (Math.random()-0.5)*3; this.radius = 10; this.color = data.color; this.name = data.name; this.img = data.img; this.dataRef = data; this.finished = false; this.eliminated = false; this.finishRank = 0; this.finishTime = 0; this.displayTime = ""; this.history = []; this.posHistory = []; this.passedCheckpoints = []; this.pUp = 0; this.pType = null; this.infected = false; }
    update() {
        if (this.finished || this.eliminated) return;
        
        let grav = curArch.getGravity(this); let rad = this.radius; let frict = 0.99; let gMult = 1;
        if(this.pUp > 0) {
            this.pUp--;
            if(this.pType.id===0) this.vy += 0.5; else if(this.pType.id===1 && this.pUp===199) this.vy = -20;
            else if(this.pType.id===3) rad = 20; else if(this.pType.id===4) rad = 5;
            else if(this.pType.id===5) gMult = 2.5; else if(this.pType.id===6) gMult = 0.2;
            else if(this.pType.id===7 && this.pUp===199) this.y += 150;
            else if(this.pType.id===11) { cameraX+=(Math.random()-0.5)*20; cameraY+=(Math.random()-0.5)*20; }
            else if(this.pType.id===13 && this.pUp===199) { marbles.forEach(o=>{ let d=Math.sqrt((this.x-o.x)**2+(this.y-o.y)**2); if(d<100&&o!==this){o.vx+=(o.x-this.x)*0.2; o.vy+=(o.y-this.y)*0.2;} }); }
            else if(this.pType.id===14 && this.pUp===199) { this.passedCheckpoints.push(this.passedCheckpoints.length); } // Skip next CP
            else if(this.pType.id===16 && this.pUp===199) { this.vy += 30; }
            else if(this.pType.id===17 && this.pUp===199) { let act=marbles.filter(m=>!m.finished&&!m.eliminated&&m!==this); if(act.length>0){ let t=act[Math.floor(Math.random()*act.length)]; let tx=t.x, ty=t.y; t.x=this.x; t.y=this.y; this.x=tx; this.y=ty; } }
            else if(this.pType.id===18) { marbles.forEach(o=>{ let d=Math.sqrt((this.x-o.x)**2+(this.y-o.y)**2); if(d<80&&o!==this){o.vx+=(this.y-o.y)*0.05; o.vy+=(this.x-o.x)*0.05;} }); }
            else if(this.pType.id===19) { frict = 1.0; this.vy += 0.2; }
        }
        
        this.vx += (grav.x * gMult) + (Math.random()-0.5)*0.02; this.vy += (grav.y * gMult) + (Math.random()-0.5)*0.02; this.vx *= frict; this.vy *= frict; this.x += this.vx; this.y += this.vy;
        if (curArch.wrapX) { if (this.x < 0) this.x = boundX; else if (this.x > boundX) this.x = 0; } else { if (this.x - rad < 0) { this.x = rad; this.vx *= -RESTITUTION; } else if (this.x + rad > boundX) { this.x = boundX - rad; this.vx *= -RESTITUTION; } }
        if (this.y - rad < 0) { this.y = rad; this.vy *= -RESTITUTION; } else if (this.y + rad > boundY && !isKnockoutMode) { this.y = boundY - rad; this.vy *= -RESTITUTION; }
        
        // Anti-Stuck 5.0 (Position Tracking)
        this.posHistory.push({x: this.x, y: this.y});
        if (this.posHistory.length > 60) {
            let oldPos = this.posHistory.shift(); let dist = Math.sqrt(Math.pow(this.x - oldPos.x, 2) + Math.pow(this.y - oldPos.y, 2));
            if (dist < 3) { this.vx = (Math.random()-0.5)*30; this.vy = (Math.random()-0.5)*30 - 10; if(!curArch.wrapX){ this.x = Math.max(rad, Math.min(boundX-rad, this.x + (Math.random()-0.5)*20)); } this.y -= 5; this.posHistory = []; }
        }

        let prog = curArch.getProgress(this);
        if (isKnockoutMode) {
            checkpoints.forEach((cp, i) => {
                if (prog >= cp.target && !this.passedCheckpoints.includes(i)) {
                    this.passedCheckpoints.push(i); cp.count++;
                    if (cp.count > cp.allowed && !(this.pUp>0 && this.pType.id===10)) { this.eliminated = true; this.finishTime = performance.now() - raceStartTime; this.finishRank = activeCompetitors.length - cp.count + 1; this.displayTime = `Eliminated: ${this.finishRank}th Place`; }
                }
            });
            if(marbles.filter(m=>!m.eliminated && !m.finished).length === 1 && checkpoints.length > 0) { let w = marbles.find(m=>!m.eliminated && !m.finished); w.finished = true; w.finishTime = performance.now() - raceStartTime; w.finishRank = 1; this.displayTime = formatTimePrecise(w.finishTime); }
            if(marbles.every(m=>m.finished || m.eliminated)) setTimeout(endRace, 1000);
        } else if (curArch.checkFinish(this)) { this.finished = true; this.finishTime = performance.now() - raceStartTime; this.finishRank = marbles.filter(m => m.finished).length; this.displayTime = formatTimePrecise(this.finishTime); if (marbles.every(m => m.finished)) setTimeout(endRace, 1000); }
    }
    draw() {
        if(this.eliminated) ctx.globalAlpha = 0.3;
        let rad = this.radius; if(this.pUp>0 && this.pType.id===3) rad = 20; else if(this.pUp>0 && this.pType.id===4) rad = 5;
        ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, rad, 0, Math.PI * 2);
        if (this.img && this.img.complete) { ctx.clip(); ctx.drawImage(this.img, this.x - rad, this.y - rad, rad*2, rad*2); } else { ctx.fillStyle = this.infected ? "#32cd32" : (this.pUp>0 && this.pType.id===19 && frameCount%10<5) ? "#ffffff" : this.color; ctx.fill(); ctx.beginPath(); ctx.arc(this.x - rad/3, this.y - rad/3, rad/4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill(); }
        ctx.restore(); ctx.beginPath(); ctx.arc(this.x, this.y, rad, 0, Math.PI*2); ctx.strokeStyle = (this.pUp>0 && this.pType.id===10) ? '#ffd700' : '#000'; ctx.lineWidth = (this.pUp>0 && this.pType.id===10) ? 3 : 1; ctx.stroke(); ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.fillText(this.name, this.x, this.y - rad - 4);
        if(this.pUp>0) { ctx.fillText(this.pType.icon, this.x, this.y+4); }
        if(this.eliminated) { ctx.fillStyle = '#ff3366'; ctx.font = 'bold 16px Arial'; ctx.fillText('❌', this.x, this.y+5); ctx.globalAlpha = 1.0; }
    }
}
class Peg { constructor(x, y, radius, bounce=RESTITUTION) { this.x = x; this.y = y; this.radius = radius; this.bounce = bounce; } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = curTheme.pegs; ctx.fill(); } }
function resolveCollision(marble, peg) { if(marble.pUp>0 && marble.pType.id===2) return; let dx = marble.x - peg.x; let dy = marble.y - peg.y; let dist = Math.sqrt(dx*dx + dy*dy); if(dist===0){dx=0.1;dy=0.1;dist=0.14;} let rad = marble.pUp>0&&marble.pType.id===3?20:marble.pUp>0&&marble.pType.id===4?5:10; let minDist = rad + peg.radius; if (dist < minDist) { let overlap = minDist - dist; marble.x += (dx/dist)*overlap; marble.y += (dy/dist)*overlap; let p = 2 * (marble.vx*(dx/dist) + marble.vy*(dy/dist)); marble.vx = ((marble.vx - p*(dx/dist)) * peg.bounce) + (Math.random()-0.5)*0.1; marble.vy = ((marble.vy - p*(dy/dist)) * peg.bounce) + (Math.random()-0.5)*0.1; } }
let masterCompetitorList = []; let activeCompetitors = []; let nextMarbleId = 0; let customBackgroundImage = null;
let isTournamentMode = false; let isKnockoutMode = false; let isSuddenDeath = false; let isInfection = false; let currentRound = 1; let marbles = []; let pegs = []; let powerupOrbs = []; let boundX = 500; let boundY = 5000;
let raceOver = false; let cameraX = 0; let cameraY = 0; let animationId; let frameCount = 0; let curTheme = trackDesigns[0]; let curArch = mapArchitectures[0];
let spectatedMarble = null; let raceStartTime = 0; let mediaRecorder; let recordedChunks = []; let isRecording = false; let checkpoints = []; let selectedPowerups = [];

function toggleModes() { let mode = document.getElementById('raceModeSelect').value; document.getElementById('knockoutSettings').style.display = mode === 'knockout' ? 'block' : 'none'; document.getElementById('suddenDeathSettings').style.display = mode === 'suddendeath' ? 'block' : 'none'; document.getElementById('tournamentSettings').style.display = document.getElementById('tournamentToggle').checked ? 'block' : 'none'; }
function togglePowerups() { document.getElementById('powerupMenu').style.display = document.getElementById('powerupToggle').checked ? 'block' : 'none'; }
function formatTimePrecise(ms) { let mins = Math.floor(ms / 60000); let secs = Math.floor((ms % 60000) / 1000); let micro = ((ms % 1000) * 1000).toFixed(0).padStart(6, '0'); return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${micro}`; }

function initUI() {
    const ds = document.getElementById('trackDesignSelect'); trackDesigns.forEach((d, i) => ds.innerHTML += `<option value="${i}">${d.name}</option>`);
    const arch = document.getElementById('mapArchitectureSelect'); mapArchitectures.forEach((a, i) => arch.innerHTML += `<option value="${i}">${a.name}</option>`);
    const ts = document.getElementById('templateSelect'); Object.keys(templates).forEach(key => ts.innerHTML += `<option value="${key}">${key}</option>`);
    
    const pGrid = document.getElementById('powerupCheckboxGrid');
    ALL_POWERUPS.forEach(p => { pGrid.innerHTML += `<div class="powerup-item"><input type="checkbox" value="${p.id}" checked> ${p.icon} ${p.name}</div>`; });
    applyTemplate('Colors (32)');
}
function applyTemplate(fKey = null) { const k = fKey || document.getElementById('templateSelect').value; if (!templates[k]) return; masterCompetitorList = []; nextMarbleId = 0; templates[k].forEach(i => { let [n, c] = i.split(':'); masterCompetitorList.push({ id: nextMarbleId++, name:n, color:c, img: null }); }); renderMarbleList(); }
function addBulkMarbles() { let lst = document.getElementById('bulkAddList').value.split('\n'); let add = 0; lst.forEach(n => { n = n.trim(); if (n) { masterCompetitorList.push({ id: nextMarbleId++, name:n, color: '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'), img: null }); add++; } }); if(add > 0) { document.getElementById('bulkAddList').value = ''; renderMarbleList(); } }
function renderMarbleList() { const list = document.getElementById('marbleList'); list.innerHTML = ''; masterCompetitorList.forEach((c, i) => { list.innerHTML += `<div class="marble-row"><span style="color:#94a3b8; font-weight:bold;">${i+1}.</span><input type="color" onchange="masterCompetitorList.find(x=>x.id===${c.id}).color=this.value" value="${c.color}"><input type="text" onchange="masterCompetitorList.find(x=>x.id===${c.id}).name=this.value" value="${c.name}"><input type="file" accept="image/*" style="font-size:11px; max-width:120px;" onchange="handleImg(event, ${c.id})"><button class="btn btn-danger btn-small" onclick="removeMarble(${c.id})">X</button></div>`; }); document.getElementById('marbleCountDisplay').innerText = masterCompetitorList.length; }
function handleImg(e, id) { let f = e.target.files[0]; if (f) { let r = new FileReader(); r.onload = ev => { let img = new Image(); img.src = ev.target.result; masterCompetitorList.find(c => c.id === id).img = img; }; r.readAsDataURL(f); } else masterCompetitorList.find(c => c.id === id).img = null; }
function handleBgUpload(e) { let f = e.target.files[0]; if (f) { let r = new FileReader(); r.onload = ev => customBackgroundImage = `url(${ev.target.result})`; r.readAsDataURL(f); } else customBackgroundImage = null; }
function updateCustomBgState() { customBackgroundImage = null; document.getElementById('customBgUpload').value = ""; }
function addMarble() { masterCompetitorList.push({ id: nextMarbleId++, name: `Racer ${nextMarbleId}`, color: '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'), img: null }); renderMarbleList(); }
function removeMarble(id) { masterCompetitorList = masterCompetitorList.filter(c => c.id !== id); renderMarbleList(); }
function clearMarbles() { masterCompetitorList = []; renderMarbleList(); }
function randomizeAllColors() { masterCompetitorList.forEach(c => c.color = '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')); renderMarbleList(); }

function toggleRecording() {
    if(!isRecording) {
        const stream = canvas.captureStream(30); mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); recordedChunks = [];
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => { const blob = new Blob(recordedChunks, { type: 'video/webm' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'marble_race.webm'; a.click(); };
        mediaRecorder.start(500); isRecording = true; // 500ms time slice to prevent Android cutoffs!
    } else { mediaRecorder.stop(); isRecording = false; }
}
function spectate(id) { spectatedMarble = marbles.find(m => m.id === id); }
function spectateNearest() { spectatedMarble = null; }

function startTournament() { if (masterCompetitorList.length < 2) return alert("Add at least 2 marbles!"); activeCompetitors = [...masterCompetitorList]; isTournamentMode = document.getElementById('tournamentToggle').checked; currentRound = 1; startRaceEngine(); }
function startNextRound() { currentRound++; startRaceEngine(); }
function startRaceEngine() {
    let mode = document.getElementById('raceModeSelect').value; isKnockoutMode = mode === 'knockout'; isSuddenDeath = mode === 'suddendeath'; isInfection = mode === 'infection';
    let len = parseInt(document.getElementById('trackLength').value) || 7000; curTheme = trackDesigns[document.getElementById('trackDesignSelect').value]; curArch = mapArchitectures[document.getElementById('mapArchitectureSelect').value];
    canvas.style.background = customBackgroundImage ? customBackgroundImage : curTheme.bg; document.getElementById('setupMenu').style.display = 'none'; document.getElementById('postRaceUI').style.display = 'none'; document.getElementById('gameUI').style.display = 'block';
    const banner = document.getElementById('roundBanner'); if (isTournamentMode) { banner.style.display = 'block'; banner.innerText = `Round ${currentRound}`; } else { banner.style.display = 'none'; }
    cancelAnimationFrame(animationId); marbles = []; pegs = []; powerupOrbs = []; cameraX = 0; cameraY = 0; frameCount = 0; raceOver = false; spectatedMarble = null;
    
    selectedPowerups = []; if(document.getElementById('powerupToggle').checked) { document.querySelectorAll('#powerupCheckboxGrid input:checked').forEach(cb => { selectedPowerups.push(ALL_POWERUPS.find(p=>p.id===parseInt(cb.value))); }); }
    curArch.init(len); curArch.spawn(activeCompetitors); if(isInfection) { marbles[Math.floor(Math.random()*marbles.length)].infected = true; }
    
    checkpoints = [];
    if(isKnockoutMode) {
        let cpCount = parseInt(document.getElementById('cpCount').value) || 4; let cpElim = parseInt(document.getElementById('cpElim').value) || 2;
        let sP = Math.min(...marbles.map(m=>curArch.getProgress(m))); let fP = 1.0; let s = activeCompetitors.length;
        for(let i=1; i<=cpCount; i++) { if(s<=1) break; checkpoints.push({ target: sP + (fP-sP)*(i/(cpCount+1)), count: 0, allowed: Math.max(1, s - cpElim) }); s = Math.max(1, s - cpElim); }
    }
    raceStartTime = performance.now(); if(document.getElementById('autoRecordToggle').checked && !isRecording) toggleRecording(); animate();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); frameCount++; let now = performance.now();
    document.getElementById('gameTimer').innerText = formatTimePrecise(now - raceStartTime);
    
    let fns = marbles.filter(m => m.finished).sort((a,b) => a.finishRank - b.finishRank);
    let act = marbles.filter(m => !m.finished && !m.eliminated).sort((a,b) => curArch.getProgress(b) - curArch.getProgress(a));
    let elm = marbles.filter(m => m.eliminated).sort((a,b) => b.finishTime - a.finishTime); 
    let sorted = [...fns, ...act, ...elm];
    
    if (frameCount % 20 === 0 && !marbles.every(m=>m.finished||m.eliminated)) { sorted.forEach((m, i) => m.history.push(m.finished||m.eliminated ? m.finishRank : i + 1)); }
    if(spectatedMarble && (spectatedMarble.finished || spectatedMarble.eliminated)) spectatedMarble = null;
    let activeLeader = act[0] || fns[fns.length-1] || sorted[0]; let camT = curArch.camTarget(spectatedMarble || activeLeader); 
    cameraX += (Math.min(Math.max(0, camT.x), Math.max(0, boundX - canvas.width)) - cameraX) * 0.1; cameraY += (Math.min(Math.max(0, camT.y), Math.max(0, boundY - canvas.height)) - cameraY) * 0.1;
    
    ctx.save(); ctx.translate(-cameraX, -cameraY); ctx.strokeStyle = curTheme.lines; ctx.lineWidth = 3;
    if(!isKnockoutMode && curArch.drawFinish) curArch.drawFinish();
    if(isKnockoutMode) { checkpoints.forEach((cp, i) => { let cy = curArch.name.includes("Dash") ? (cp.target*boundX) : curArch.name.includes("Ascen") ? (boundY-(cp.target*boundY)) : (cp.target*boundY); if(curArch.name.includes("Vertical") || curArch.name.includes("Ascen")) { ctx.setLineDash([10,10]); ctx.strokeStyle='#f43f5e'; ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(boundX, cy); ctx.stroke(); ctx.fillStyle='#f43f5e'; ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.fillText(`CP ${i+1} (Top ${cp.allowed} Surive)`, boundX/2, cy+20); ctx.setLineDash([]); } }); }
    
    if(selectedPowerups.length > 0 && frameCount%60===0 && Math.random()<0.5) { let l=act[0]; if(l) powerupOrbs.push(new PowerupOrb(l.x+(Math.random()-0.5)*300, l.y+(Math.random()-0.5)*500, selectedPowerups[Math.floor(Math.random()*selectedPowerups.length)])); }
    powerupOrbs.forEach(po => { po.draw(); if(po.active) { marbles.forEach(m => { if(!m.finished && !m.eliminated && Math.sqrt((m.x-po.x)**2+(m.y-po.y)**2)<m.radius+po.radius) { po.active = false; m.pUp = 200; m.pType = po.type; } }); } });
    
    pegs.forEach(p => { if (p.x > cameraX-20 && p.x < cameraX+canvas.width+20 && p.y > cameraY-20 && p.y < cameraY+canvas.height+20) p.draw(); });
    marbles.forEach(m => { m.update(); pegs.forEach(p => resolveCollision(m, p)); marbles.forEach(o => { if (m !== o && !m.finished && !o.finished && !m.eliminated && !o.eliminated) { let rad1 = m.pUp>0&&m.pType.id===3?20:m.pUp>0&&m.pType.id===4?5:10; let rad2 = o.pUp>0&&o.pType.id===3?20:o.pUp>0&&o.pType.id===4?5:10; let dx = o.x - m.x; let dy = o.y - m.y; let dist = Math.sqrt(dx*dx + dy*dy); if(dist===0)dist=0.1; if (dist < rad1 + rad2) { if(isInfection){if(m.infected&&!o.infected)o.infected=true; else if(o.infected&&!m.infected)m.infected=true;} if(m.pUp>0&&m.pType.id===2)return; let tX = m.vx; let tY = m.vy; m.vx = o.vx*RESTITUTION; m.vy = o.vy*RESTITUTION; o.vx = tX*RESTITUTION; o.vy = tY*RESTITUTION; let overlap = (rad1 + rad2) - dist; m.x -= (dx/dist)*(overlap/2); m.y -= (dy/dist)*(overlap/2); m.x += (Math.random()-0.5)*0.2; } else { if(m.pUp>0&&m.pType.id===8) { o.vx*=0.1; o.vy*=0.1; } if(m.pUp>0&&m.pType.id===9&&dist<150) { o.vx-=(dx/dist)*0.5; o.vy-=(dy/dist)*0.5; } if(m.pUp>0&&m.pType.id===12&&dist<100) { o.vx+=(dx/dist)*2; o.vy+=(dy/dist)*2; } if(m.pUp>0&&m.pType.id===15&&dist<80) { o.vx*=0.8; o.vy*=0.8; } } } }); m.draw(); });
    ctx.restore();
    
    if(isSuddenDeath) { let intv = (parseInt(document.getElementById('sdInterval').value)||5)*1000; if(now - raceStartTime > intv && act.length > 1) { let last = act[act.length-1]; if(!(last.pUp>0 && last.pType.id===10)){ last.eliminated = true; last.finishTime = now - raceStartTime; last.finishRank = act.length; last.displayTime = `Eliminated: ${last.finishRank}th Place`; raceStartTime = now; } } if(act.length===1 && marbles.filter(m=>!m.eliminated).length===1) { act[0].finished=true; act[0].finishTime=now-raceStartTime; act[0].finishRank=1; act[0].displayTime=formatTimePrecise(act[0].finishTime); setTimeout(endRace,1000); } }
    
    // Draw Leaderboard ON Video Canvas
    ctx.fillStyle = "rgba(15, 23, 42, 0.85)"; ctx.fillRect(canvas.width - 220, 10, 210, 310);
    ctx.fillStyle = "#00ffcc"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText("LIVE STANDINGS", canvas.width - 115, 30);
    for(let i=0; i<Math.min(10, sorted.length); i++) { let m = sorted[i]; ctx.fillStyle = m.eliminated ? "rgba(244,63,94,0.3)" : m.finished ? "rgba(0,255,204,0.2)" : "rgba(255,255,255,0.1)"; ctx.fillRect(canvas.width-215, 45+i*25, 200, 22); ctx.fillStyle = m.color; ctx.beginPath(); ctx.arc(canvas.width-200, 56+i*25, 6, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = m.eliminated ? "#94a3b8" : "#ffffff"; ctx.textAlign = "left"; ctx.fillText(`${m.finished||m.eliminated?m.finishRank:i+1}. ${m.name.substring(0,10)}`, canvas.width-185, 60+i*25); }

    if (frameCount % 5 === 0) { 
        document.getElementById('lbContent').innerHTML = sorted.map((m, i) => `<div class="lb-item ${m.finished?'finished':''} ${m.eliminated?'eliminated':''}" onclick="spectate(${m.id})" style="${spectatedMarble===m?'border-color:#00ffcc':''}"><div class="lb-rank">${m.finished||m.eliminated ? m.finishRank : i+1}.</div><div class="lb-color" style="background:${m.color}"></div><div class="lb-name">${m.name}</div><div class="lb-time">${m.finished||m.eliminated ? m.displayTime : formatTimePrecise(now - raceStartTime)}</div></div>`).join(''); 
    }
    if (!raceOver) animationId = requestAnimationFrame(animate);
}

function endRace() {
    raceOver = true; if(isRecording) toggleRecording(); document.getElementById('gameUI').style.display = 'none'; document.getElementById('postRaceUI').style.display = 'block'; 
    let sortedRef = [...marbles].sort((a,b) => { let ar = a.finished||a.eliminated ? a.finishRank : 999; let br = b.finished||b.eliminated ? b.finishRank : 999; return ar - br; });
    let winner = sortedRef[0]; drawGraph();
    
    let validF = sortedRef.filter(m => m.finished).sort((a,b) => a.finishTime - b.finishTime); let gaps = [];
    for(let i=1; i<validF.length; i++) gaps.push({ m1: validF[i-1], m2: validF[i], diff: validF[i].finishTime - validF[i-1].finishTime });
    gaps.sort((a,b) => a.diff - b.diff); let top5 = gaps.slice(0, 5);
    
    let cfHTML = top5.length === 0 ? "Not enough finishers to compare." : top5.map((g, i) => `<div style="color:#fff; padding:8px; background:rgba(0,0,0,0.4); margin-bottom:8px; border-radius:8px; border-left: 4px solid ${i===0?'#00ffcc':'#38bdf8'};"><span style="color:${g.m1.color}">${g.m1.name}</span> vs <span style="color:${g.m2.color}">${g.m2.name}</span> <span style="color:#fbbf24; float:right;">Δ ${(g.diff/1000).toFixed(6)}s</span></div>`).join('');
    document.getElementById('closestFinishes').innerHTML = cfHTML;

    if (!isTournamentMode) { document.getElementById('postRaceTitle').innerText = "Race Complete!"; document.getElementById('winnerText').innerHTML = `🥇 1st Place: <span style="color:${winner.color}">${winner.name}</span>`; document.getElementById('tournamentResults').style.display = 'none'; document.getElementById('nextRoundBtn').style.display = 'none'; return; }
    
    let elimStr = document.getElementById('eliminationPattern').value; let elimArr = elimStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0); if(elimArr.length === 0) elimArr = [1];
    let toEliminate = elimArr[currentRound - 1] || elimArr[elimArr.length - 1]; let nextCount = Math.max(1, activeCompetitors.length - toEliminate);
    let advancingMarbles = sortedRef.slice(0, nextCount); let eliminatedMarbles = sortedRef.slice(nextCount);
    
    document.getElementById('tournamentResults').style.display = 'grid'; document.getElementById('advancingList').innerHTML = advancingMarbles.map(m => `<div>${m.finishRank}. ${m.name}</div>`).join(''); document.getElementById('eliminatedList').innerHTML = eliminatedMarbles.map(m => `<div>${m.finishRank}. ${m.name}</div>`).join('');
    if (nextCount === 1) { document.getElementById('postRaceTitle').innerText = "TOURNAMENT COMPLETE!"; document.getElementById('winnerText').innerHTML = `👑 GRAND CHAMPION: <span style="color:${advancingMarbles[0].color}">${advancingMarbles[0].name}</span> 👑`; document.getElementById('nextRoundBtn').style.display = 'none'; } else { document.getElementById('postRaceTitle').innerText = `Round ${currentRound} Complete!`; document.getElementById('winnerText').innerHTML = `${eliminatedMarbles.length} Marbles Eliminated.`; document.getElementById('nextRoundBtn').style.display = 'block'; document.getElementById('nextRoundBtn').innerText = nextCount === 2 ? "Start GRAND FINALE" : `Start Round ${currentRound + 1}`; activeCompetitors = advancingMarbles.map(m => m.dataRef); }
}

function drawGraph() { const gCanvas = document.getElementById('graphCanvas'); const gCtx = gCanvas.getContext('2d'); gCtx.clearRect(0,0, gCanvas.width, gCanvas.height); const w = gCanvas.width; const h = gCanvas.height; const pad = 30; const num = marbles.length; gCtx.strokeStyle = 'rgba(255,255,255,0.1)'; gCtx.lineWidth = 1; for(let i=1; i<=num; i++) { let y = pad + ((i-1) / (num-1 || 1)) * (h - pad*2); gCtx.beginPath(); gCtx.moveTo(0, y); gCtx.lineTo(w, y); gCtx.stroke(); } const legend = document.getElementById('graphLegend'); legend.innerHTML = ''; marbles.sort((a,b) => a.finishRank - b.finishRank).forEach(m => { gCtx.strokeStyle = m.color; gCtx.lineWidth = 3; gCtx.lineJoin = 'round'; gCtx.beginPath(); m.history.forEach((rank, step) => { let x = pad + (step / Math.max(1, m.history.length-1)) * (w - pad*2); let y = pad + ((rank-1) / (num-1 || 1)) * (h - pad*2); step === 0 ? gCtx.moveTo(x, y) : gCtx.lineTo(x, y); }); gCtx.stroke(); legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${m.color}"></div>${m.finishRank}. ${m.name}</div>`; }); }
function abortRace() { cancelAnimationFrame(animationId); if(isRecording) toggleRecording(); fullReset(); } function fullReset() { document.getElementById('postRaceUI').style.display = 'none'; document.getElementById('gameUI').style.display = 'none'; document.getElementById('setupMenu').style.display = 'block'; }
initUI();
</script>
